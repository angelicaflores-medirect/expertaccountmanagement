                {/* Type selector */}
                <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
                  {COMM_TYPES.map(ct=>(
                    <button key={ct.v} onClick={()=>setNewLog(p=>({...p,type:ct.v}))}
                      style={{padding:'4px 10px',border:`1px solid ${newLog.type===ct.v?ct.color:'#e5e7eb'}`,borderRadius:16,background:newLog.type===ct.v?ct.color+'18':'transparent',color:newLog.type===ct.v?ct.color:'#6b7280',fontSize:11,fontWeight:newLog.type===ct.v?700:400,cursor:'pointer',fontFamily:'inherit'}}>
                      {ct.icon} {ct.label}
                    </button>
                  ))}
                </div>

                {/* Row 1 — Date + Logged by */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div>
                    <div style={{fontSize:10,color:'#6b7280',marginBottom:3}}>Date (AEST)</div>
                    <input type="date" value={newLog.date} onChange={e=>setNewLog(p=>({...p,date:e.target.value}))}
                      style={{width:'100%',padding:'6px 8px',border:'1px solid #e5e7eb',borderRadius:6,fontSize:12,fontFamily:'inherit'}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'#6b7280',marginBottom:3}}>Logged by</div>
                    <select value={ALL_AMS.includes(newLog.by) ? newLog.by : '__custom'}
                      onChange={e => {
                        if (e.target.value !== '__custom') setNewLog(p=>({...p,by:e.target.value}));
                      }}
                      style={{width:'100%',padding:'6px 8px',border:'1px solid #e5e7eb',borderRadius:6,fontSize:12,fontFamily:'inherit',background:'#fff',marginBottom:4}}>
                      {ALL_AMS.map(am=>(
                        <option key={am} value={am}>{am}</option>
                      ))}
                      {!ALL_AMS.includes(newLog.by) && newLog.by && (
                        <option value="__custom">{newLog.by}</option>
                      )}
                      <option value="__custom">Other…</option>
                    </select>
                    {(!ALL_AMS.includes(newLog.by) || newLog.by === '') && (
                      <input value={ALL_AMS.includes(newLog.by) ? '' : newLog.by}
                        onChange={e=>setNewLog(p=>({...p,by:e.target.value}))}
                        placeholder="Enter name…"
                        style={{width:'100%',padding:'6px 8px',border:'1px solid #e5e7eb',borderRadius:6,fontSize:12,fontFamily:'inherit'}}/>
                    )}
                  </div>
                </div>

                {/* Notes */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:10,color:'#6b7280',marginBottom:3}}>Notes</div>
                  <textarea value={newLog.note} onChange={e=>setNewLog(p=>({...p,note:e.target.value}))}
                    placeholder="What was discussed, outcome, context…"
                    style={{width:'100%',padding:'7px 9px',border:'1px solid #e5e7eb',borderRadius:6,fontSize:12,fontFamily:'inherit',resize:'vertical',minHeight:72}}/>
                </div>

                {/* Sentiment */}
                <div style={{marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11,color:'#6b7280',flexShrink:0}}>How did it go?</span>
                  {[['positive','😊 Positive','#15803d','#f0fdf4','#86efac'],['neutral','😐 Neutral','#6b7280','#f8faff','#e5e7eb'],['negative','😟 Negative','#dc2626','#fef2f2','#fecaca']].map(([val,label,col,bg,border])=>(
                    <button key={val} onClick={()=>setNewLog(p=>({...p,sentiment:val}))}
                      style={{padding:'3px 10px',border:`1px solid ${newLog.sentiment===val?border:'#e5e7eb'}`,borderRadius:12,background:newLog.sentiment===val?bg:'transparent',color:newLog.sentiment===val?col:'#9ca3af',fontSize:11,fontWeight:newLog.sentiment===val?700:400,cursor:'pointer',fontFamily:'inherit'}}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Task attached to this interaction */}
                <div style={{marginBottom:8,padding:'8px 10px',background:'#ecfeff',borderRadius:7,border:'1px solid #a5f3fc'}}>
                  <div style={{fontSize:10,color:'#0891b2',fontWeight:600,marginBottom:4}}>✅ Attach a task to this interaction (optional)</div>
                  <input value={newLog.task} onChange={e=>setNewLog(p=>({...p,task:e.target.value}))}
                    placeholder="e.g. Send fee schedule, Book follow-up call, Check availability…"
                    style={{width:'100%',padding:'6px 8px',border:'1px solid #a5f3fc',borderRadius:6,fontSize:12,fontFamily:'inherit',background:'#fff'}}/>
                </div>

                {/* Follow-up date */}
                <div style={{marginBottom:8,padding:'8px 10px',background:'#f5f3ff',borderRadius:7,border:'1px solid #c4b5fd'}}>
                  <div style={{fontSize:10,color:'#7c3aed',fontWeight:600,marginBottom:4}}>📅 Follow-up date (optional) — AEST</div>
                  <input type="date" value={newLog.followUp||''} onChange={e=>setNewLog(p=>({...p,followUp:e.target.value}))}
                    style={{width:'100%',padding:'6px 8px',border:'1px solid #c4b5fd',borderRadius:6,fontSize:12,fontFamily:'inherit',background:'#fff'}}/>
                  {newLog.followUp && (()=>{
                    const d = daysUntilAEST(newLog.followUp);
                    return <div style={{fontSize:10,color:'#7c3aed',marginTop:4}}>
                      {d < 0 ? `${Math.abs(d)}d overdue` : d === 0 ? 'Today' : d === 1 ? 'Tomorrow' : `In ${d} days`}
                    </div>;
                  })()}
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={addLog}
                    style={{flex:1,padding:'8px',background:amCol,color:'#fff',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                    Save interaction
                  </button>
                  <button onClick={()=>setShowLogForm(false)}
                    style={{padding:'8px 12px',background:'transparent',color:'#6b7280',border:'1px solid #e5e7eb',borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {/* Log timeline */}
            {logs.length === 0 ? (
              <div style={{textAlign:'center',padding:'24px 0',color:'#94a3b8',fontSize:12}}>
                No interactions logged yet
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {logs.map((log,i) => {
                  const ct = COMM_TYPES.find(c=>c.v===log.type) || COMM_TYPES[4];
                  return (
                    <div key={log.id||i} style={{display:'flex',gap:10,padding:'10px 12px',background:'#fafafa',borderRadius:8,border:'1px solid #f1f5f9',position:'relative'}}>
                      <div style={{width:28,height:28,borderRadius:'50%',background:ct.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>
                        {ct.icon}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                          <span style={{fontSize:11,fontWeight:600,color:ct.color}}>{ct.label}</span>
                          <span style={{fontSize:10,color:'#9ca3af'}}>{fmtTs(log.ts)}</span>
                          {log.by && <span style={{fontSize:10,color:'#9ca3af'}}>· {log.by}</span>}
                          {log.sentiment === 'positive' && <span style={{fontSize:11}} title="Positive">😊</span>}
                          {log.sentiment === 'negative' && <span style={{fontSize:11}} title="Negative">😟</span>}
                        </div>
                        <div style={{fontSize:12,color:'#374151',lineHeight:1.5}}>{log.note}</div>
                        {/* Task attached to this interaction */}
                        {log.task && (
                          <div style={{marginTop:6,padding:'5px 8px',background:log.taskDone?'#f0fdf4':'#ecfeff',borderRadius:5,border:`1px solid ${log.taskDone?'#86efac':'#a5f3fc'}`,display:'flex',alignItems:'center',gap:6}}>
                            <span style={{fontSize:12}}>{log.taskDone?'✅':'⬜'}</span>
                            <span style={{fontSize:11,color:log.taskDone?'#15803d':'#0891b2',textDecoration:log.taskDone?'line-through':'none',flex:1}}>{log.task}</span>
                            {log.taskDone && log.taskDoneTs && (
                              <span style={{fontSize:10,color:'#9ca3af'}}>Done {new Date(log.taskDoneTs).toLocaleDateString('en-AU',{timeZone:'Australia/Sydney',day:'2-digit',month:'short'})}</span>
                            )}
                          </div>
                        )}
                        {/* Follow-up date */}
                        {log.followUp && (()=>{
                          const d = daysUntilAEST(log.followUp);
                          const overdue = d < 0;
                          const today = d === 0;
                          const soon = d > 0 && d <= 3;
                          if (log.followUpDone) return (
                            <div style={{marginTop:4,fontSize:10,color:'#9ca3af'}}>
                              📅 Follow-up {new Date(log.followUp).toLocaleDateString('en-AU',{timeZone:'Australia/Sydney',day:'2-digit',month:'short'})} — ✓ done
                            </div>
                          );
                          return (
                            <div style={{marginTop:5,padding:'4px 8px',background:overdue?'#fef2f2':today||soon?'#fffbeb':'#f5f3ff',borderRadius:5,border:`1px solid ${overdue?'#fecaca':today||soon?'#fde68a':'#c4b5fd'}`,display:'flex',alignItems:'center',gap:6}}>
                              <span style={{fontSize:11}}>📅</span>
                              <span style={{fontSize:11,color:overdue?'#dc2626':today||soon?'#d97706':'#7c3aed',fontWeight:600,flex:1}}>
                                Follow-up {new Date(log.followUp).toLocaleDateString('en-AU',{timeZone:'Australia/Sydney',day:'2-digit',month:'short',year:'numeric'})}
                                {overdue ? ` — ${Math.abs(d)}d overdue` : today ? ' — Today' : d===1 ? ' — Tomorrow' : soon ? ` — In ${d} days` : ''}
                              </span>
                              <button onClick={(e)=>{e.stopPropagation();const updLogs=logs.map((l,li)=>li===i?{...l,followUpDone:true,followUpDoneTs:Date.now()}:l);setLogs(updLogs);save(updLogs,notes,training,undefined,undefined,undefined);}}
                                style={{background:overdue?'#dc2626':today||soon?'#d97706':'#7c3aed',border:'none',cursor:'pointer',color:'#fff',fontSize:10,padding:'2px 8px',borderRadius:4,fontWeight:600,fontFamily:'inherit'}}>
                                ✓ Done
                              </button>
                            </div>
                          );
                        })()}
                      </div>
                      <div style={{position:'absolute',top:6,right:6,display:'flex',gap:4}}>
                        {log.type === 'task' && !log.taskDone && (
                          <button onClick={(e)=>{e.stopPropagation();const updLogs=logs.map((l,li)=>li===i?{...l,taskDone:true,taskDoneTs:Date.now()}:l);setLogs(updLogs);save(updLogs,notes,training,undefined,undefined,undefined);}}
                            style={{background:'#0891b2',border:'none',cursor:'pointer',color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4,fontWeight:600}}>
                            ✓ Done
                          </button>
                        )}
                        {log.type === 'task' && log.taskDone && (
                          <span style={{fontSize:10,color:'#16a34a',fontWeight:600,padding:'2px 7px'}}>✓ Done {log.taskDoneTs?new Date(log.taskDoneTs).toLocaleDateString('en-AU',{day:'2-digit',month:'short'}):''}</span>
                        )}
                        <button onClick={()=>deleteLog(log.id||i)}
                          style={{background:'transparent',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:11,padding:'2px 4px'}}
                          title="Delete">✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── Zoho CRM notes (from Supabase) ── */}
          <div style={{marginTop:18,borderTop:'1px solid #f1f5f9',paddingTop:14}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:700,color:'#374151'}}>📋 Zoho CRM Notes</span>
              {crmNotes && crmNotes.synced_at && (
                <span style={{fontSize:10,color:'#9ca3af'}}>
                  Synced {new Date(crmNotes.synced_at).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'})}
                </span>
              )}
            </div>

            {!crmNotes && (
              <div style={{fontSize:11,color:'#9ca3af',padding:'8px 0'}}>
                No notes synced yet. Click <strong style={{color:'#374151'}}>📋 Sync Notes</strong> in the top bar (from Claude.ai) to pull the last 5 notes per expert into Supabase.
              </div>
            )}

            {crmNotes && (!crmNotes.notes || crmNotes.notes.length === 0) && (
              <div style={{fontSize:11,color:'#9ca3af',padding:'8px 0'}}>No notes found in Zoho for this expert.</div>
            )}

            {crmNotes && crmNotes.notes && crmNotes.notes.length > 0 && (() => {
              // Normalise all three formats into {date, title, content}
              const normalised = crmNotes.notes.map((n, i) => {
                if (typeof n === 'string') {
                  // Format: "[2026-04-28] Title: content"  OR  "[2026-04-28] content"
                  const m = n.match(/^\[(\d{4}-\d{2}-\d{2})\]\s*(.*)/s);
                  if (m) {
                    const rest = m[2];
                    const colonIdx = rest.indexOf(':');
                    // Only treat as title:content if colon exists and title is short (< 80 chars)
                    if (colonIdx > 0 && colonIdx < 80) {
                      return {date: m[1], title: rest.slice(0, colonIdx).trim(), content: rest.slice(colonIdx + 1).trim()};
                    }
                    return {date: m[1], title: null, content: rest};
                  }
                  return {date: null, title: null, content: n};
                }
                if (n && typeof n === 'object') {
                  // Format: {date, note}  OR  {id, title, content, date, author}
                  if (n.note !== undefined) return {date: n.date, title: null, content: n.note, author: n.author};
                  return {date: n.date, title: n.title || null, content: n.content, author: n.author};
                }
                return {date: null, title: null, content: String(n)};
              });
              return (
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {normalised.map((n, i) => (
                    <div key={i} style={{padding:'9px 11px',background:'#f8faff',borderRadius:7,border:'1px solid #e0e9ff'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom: n.title || n.content ? 4 : 0}}>
                        {n.title && <span style={{fontSize:11,fontWeight:700,color:'#374151'}}>{n.title}</span>}
                        <span style={{fontSize:10,color:'#9ca3af',flexShrink:0,marginLeft:'auto'}}>
                          {n.date ? new Date(n.date).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}) : ''}
                        </span>
                      </div>
                      {n.author && <div style={{fontSize:10,color:'#6b7280',marginBottom:4}}>{n.author}</div>}
                      {n.content && <div style={{fontSize:11,color:'#374151',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{n.content}</div>}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
                    </React.Fragment>
        )}

        {/* NOTES TAB */}
        {tab === 'notes' && (
          <div>
            <div style={{fontSize:11,color:'#6b7280',marginBottom:6}}>Permanent notes — strategy, context, flags</div>
            <textarea value={notes} onChange={e=>{setNotes(e.target.value);setNotesDirty(true);}}
              placeholder="Add context about this expert — availability preferences, communication style, known issues, opportunities…"
              style={{width:'100%',minHeight:200,padding:'10px 12px',border:'1px solid #e5e7eb',borderRadius:8,fontSize:13,fontFamily:'inherit',lineHeight:1.6,resize:'vertical',color:'#0f172a'}}/>
            {notesDirty && (
              <button onClick={saveNotes}
                style={{marginTop:8,padding:'8px 20px',background:amCol,color:'#fff',border:'none',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                Save notes
              </button>
            )}
          </div>
        )}

        {/* TRAINING TAB */}
        {tab === 'training' && (
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontSize:12,color:'#6b7280'}}>Onboarding & training checklist</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:80,height:5,background:'#f3f4f6',borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',background:trainingPct===100?'#16a34a':'#d97706',width:`${trainingPct}%`,borderRadius:4,transition:'width .3s'}}/>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:trainingPct===100?'#16a34a':'#d97706'}}>{trainingPct}%</span>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {TRAINING_ITEMS.map(item => {
                const done = !!training[item];
                return (
                  <div key={item} onClick={()=>toggleTraining(item)}
                    style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:done?'#f0fdf4':'#fafafa',borderRadius:7,border:`1px solid ${done?'#bbf7d0':'#f1f5f9'}`,cursor:'pointer',transition:'all .15s'}}>
                    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${done?'#16a34a':'#d1d5db'}`,background:done?'#16a34a':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {done && <span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:13,color:done?'#15803d':'#374151',textDecoration:done?'line-through':'none',fontWeight:done?500:400}}>
                      {item}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* PERFORMANCE TAB */}
        {tab === 'perf' && (()=>{
          const util  = UTIL_DATA[expert.name];
          const rev   = REV_DATA[expert.name];
          const stats = EXP_STATS[expert.name];
          const tat   = TAT_DATA[expert.name];
          const nb    = NB_DATA[expert.name];
          const noData = !util && !rev && !stats;
          if (noData) return (
            <div style={{padding:'24px 0',textAlign:'center',color:'#9ca3af',fontSize:12}}>
              No performance data yet — upload reports using the Upload tab
            </div>
          );
          const yoyUp  = rev && rev.yoy > 0;
          const yoyDn  = rev && rev.yoy < 0;
          const daysSinceInv = stats && stats.last ? daysSince(new Date(stats.last).getTime()) : null;
          return (
            <div>
              {/* KPI cards */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:14}}>
                {rev && (
                  <div style={{background:'#f8faff',borderRadius:8,padding:'10px 12px',border:'1px solid #e0e9ff'}}>
                    <div style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.4px'}}>Revenue (YTD)</div>
                    <div style={{fontSize:18,fontWeight:700,color:'#0f172a',marginTop:3}}>${Math.round(rev.cur/1000)}k</div>
                    {rev.prev > 0 && (
                      <div style={{fontSize:11,color:yoyUp?'#16a34a':yoyDn?'#dc2626':'#6b7280',marginTop:2,fontWeight:500}}>
                        {yoyUp?'▲':'▼'} {Math.abs(rev.yoy)}% vs prior year
                      </div>
                    )}
                  </div>
                )}
                {stats && (
                  <div style={{background:'#f8faff',borderRadius:8,padding:'10px 12px',border:'1px solid #e0e9ff'}}>
                    <div style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.4px'}}>Total Cases</div>
                    <div style={{fontSize:18,fontWeight:700,color:'#0f172a',marginTop:3}}>{stats.cases.toLocaleString()}</div>
                    <div style={{fontSize:11,color:'#6b7280',marginTop:2}}>All time</div>
                  </div>
                )}
                {util && (() => {
                  // Multi-month data takes priority if available
                  const months = MONTHLY_AVAIL_DATA[expert.name];
                  if (months && months.length > 0) {
                    // Determine current month label and filter to current month onwards
                    const now = new Date();
                    const _MO_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    const curMoLabel = _MO_ABBR[now.getMonth()] + ' ' + String(now.getFullYear()).slice(-2);
                    // Parse a "Mon YY" label into a comparable number (e.g. "May 26" -> 202605)
                    const _MONS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
                    const moToNum = (mo) => { const [mon,yr] = mo.split(' '); return (2000 + parseInt(yr)) * 100 + (_MONS[mon] || 0); };
                    const curNum = moToNum(curMoLabel);
                    const futureMonths = months.filter(m => moToNum(m.mo) >= curNum);
                    const displayMonths = futureMonths.length > 0 ? futureMonths : months.slice(-1);
                    const totalOpen = displayMonths.reduce((s,m) => s + (m.total - m.booked), 0);
                    const totalBooked = displayMonths.reduce((s,m) => s + m.booked, 0);
                    const totalSlots = displayMonths.reduce((s,m) => s + m.total, 0);
                    return (
                      <div style={{background:'#f8faff',borderRadius:8,padding:'10px 12px',border:'1px solid #e0e9ff',gridColumn:'1 / -1'}}>
                        <div style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:8}}>Availability — {curMoLabel} to Dec 26</div>
                        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
                          {displayMonths.map((m, i) => {
                            const isCur = m.mo === curMoLabel;
                            const open = m.total - m.booked;
                            const fillPct = m.total > 0 ? Math.round((m.booked / m.total) * 100) : 0;
                            const bg = isCur ? '#0f172a' : open === 0 ? '#fef2f2' : fillPct >= 80 ? '#fef9c3' : '#f0fdf4';
                            const textCol = isCur ? '#fff' : open === 0 ? '#dc2626' : fillPct >= 80 ? '#92400e' : '#15803d';
                            const border = isCur ? 'none' : `1px solid ${open === 0 ? '#fecaca' : fillPct >= 80 ? '#fde68a' : '#bbf7d0'}`;
                            return (
                              <div key={i} style={{padding:'5px 8px',borderRadius:6,background:bg,border,minWidth:60,textAlign:'center'}}>
                                <div style={{fontSize:10,fontWeight:700,color:isCur?'#94a3b8':textCol,marginBottom:1}}>{m.mo}</div>
                                <div style={{fontSize:12,fontWeight:700,color:isCur?'#fff':textCol}}>{open} open</div>
                                <div style={{fontSize:10,color:isCur?'#94a3b8':textCol}}>{m.booked} filled</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{fontSize:11,color:'#6b7280'}}>
                          Total: <strong>{totalOpen} open</strong> · {totalBooked} filled · {totalSlots} slots across {displayMonths.length} month{displayMonths.length !== 1 ? 's' : ''}
                        </div>
                      </div>
                    );
                  }
                  // Fallback: single-month snapshot
                  return (
                    <div style={{background:'#f8faff',borderRadius:8,padding:'10px 12px',border:'1px solid #e0e9ff'}}>

                  if (!emailDraft.body.trim()) { showToast('Add a message body', 'err'); return; }

                  const mailto = `mailto:${emailDraft.to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(emailDraft.body)}`;
                  window.open(mailto);
                  const toLabel = emailDraft.toName ? `${emailDraft.toName} <${emailDraft.to}>` : emailDraft.to;
                  const entry = {type:'email', note:`To: ${toLabel}\nSubject: ${subj}\n\n${emailDraft.body}`, ts:Date.now(), id:Date.now(), by: newLog.by || expert.am || 'AM', to:emailDraft.to};
                  const updLogs = [entry, ...logs];
                  setLogs(updLogs);
                  await save(updLogs, notes, training, undefined, undefined, undefined);
                  setShowEmail(false);
                  setEmailDraft({to:'',toName:'',subject:'',body:''});
                  showToast('✓ Email opened + logged');
                }} style={{flex:1,padding:'9px',background:amCol,color:'#fff',border:'none',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                  Open in Mail + Log

                  Cancel
                </button>

            </div>
          </div>
        </div>
      )}

    </div>
  );
}

function AMWorkloadDashboard({experts, commsData, baselineData, onClose}) {
  baselineData = baselineData || {};
  const [view, setView] = useState('workload'); // 'workload' | 'capacity' | 'risk'

  // ── AM workload stats ────────────────────────────────────────────────────
  const amStats = useMemo(() => {
    return ALL_AMS.map(am => {
      const myExperts = experts.filter(e => e.am === am && ['Recruited','Casual'].includes(e.status));
      const cold = myExperts.filter(e => {
        const logs = commsData[e.name]?.logs || [];
        return daysSince(logs[0]?.ts) > 30;
      });
      const overdueFU = myExperts.filter(e => {
        const logs = commsData[e.name]?.logs || [];
        return logs.some(l => l.followUp && !l.followUpDone && daysUntilAEST(l.followUp) < 0);
      });
      const highAttn = myExperts.filter(e => scoreExpert(e, commsData, baselineData).attention >= 50);
      const exitHigh = myExperts.filter(e => getExitRisk(e, commsData).level === 'high');
      const reviewDue = myExperts.filter(e => daysUntilReviewDue(e, commsData, baselineData) <= 0);
      return { am, total: myExperts.length, cold: cold.length, overdueFU: overdueFU.length, highAttn: highAttn.length, exitHigh: exitHigh.length, reviewDue: reviewDue.length };
    });
  }, [experts, commsData]);

  // ── Exit risk list ────────────────────────────────────────────────────────
  const exitRiskList = useMemo(() => {
    return experts
      .filter(e => ['Recruited','Casual'].includes(e.status))
      .map(e => ({ expert: e, risk: getExitRisk(e, commsData, baselineData) }))
      .filter(x => x.risk.level !== 'low')
      .sort((a,b) => b.risk.score - a.risk.score)
      .slice(0, 20);
  }, [experts, commsData]);

  // ── Capacity by specialty ─────────────────────────────────────────────────
  const capacityBySpec = useMemo(() => {
    const map = {};
    experts.filter(e => e.status === 'Recruited').forEach(e => {
      const spec = e.spec || 'Other';
      if (!map[spec]) map[spec] = { spec, total: 0, slots: 0, booked: 0 };
      map[spec].total++;
      const util = UTIL_DATA[e.name];
      if (util) { map[spec].slots += util.total; map[spec].booked += util.booked; }
    });
    return Object.values(map)
      .filter(s => s.total >= 2)
      .sort((a,b) => b.total - a.total)
      .slice(0, 15);
  }, [experts]);

  // ── Peer comparison — per expert vs specialty avg ────────────────────────
  const peerComparison = useMemo(() => {
    const specRevMap = {};
    experts.forEach(e => {
      const spec = e.spec || 'Other';

      if (!rev || !rev.cur) return;
      if (!specRevMap[spec]) specRevMap[spec] = [];
      specRevMap[spec].push(rev.cur);
    });
    const specAvg = {};
    Object.entries(specRevMap).forEach(([spec, revs]) => {
      specAvg[spec] = revs.reduce((a,b) => a+b, 0) / revs.length;

    return specAvg;

    <div style={{background:'#fff',borderRadius:12,margin:'0 0 12px',boxShadow:'0 2px 8px rgba(0,0,0,.08)',border:'1px solid #e5e7eb',overflow:'hidden'}}>

      </div>

      <div style={{padding:'16px 18px',maxHeight:'50vh',overflowY:'auto'}}>

        {/* ── AM WORKLOAD VIEW ── */}
        {view === 'workload' && (
          <div>

function UploadModal({onClose, showToast}) {
  const [status, setStatus] = useState({});
  const [lastUploaded, setLastUploaded] = useState({});
  const [matchReport, setMatchReport] = useState(null); // {key, matched, unmatched, headers}
  const [showMatchReport, setShowMatchReport] = useState(false);

  // Fuzzy name normaliser — strips titles, extra spaces, lowercases
  function normaliseName(n) {
    if (!n) return '';
    return String(n)
      .replace(/\b(dr|prof|mr|ms|mrs|assoc|a\/prof)\b\.?/gi, '')
      .replace(/\b(AM|OAM|AO|OBE)\b/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  // Build lookup of all expert names (normalised)
  const expertNames = useMemo(() => {
    return EXPERTS_RAW.map(r => ({raw: r[0], norm: normaliseName(r[0])}));
  }, []);

  function findMatch(uploadedName) {
    const norm = normaliseName(uploadedName);
    // Exact normalised match
    const exact = expertNames.find(e => e.norm === norm);
    if (exact) return {expert: exact.raw, type: 'exact'};
    // Partial match — uploaded name contains expert name or vice versa
    const partial = expertNames.find(e => norm.includes(e.norm) || e.norm.includes(norm));
    if (partial) return {expert: partial.raw, type: 'partial'};
    return null;
  }

  const handleFile = useCallback(async (file, key) => {
    setStatus(p => ({...p, [key]: 'loading'}));
    try {
      const data = await file.arrayBuffer();
      const wb = window.XLSX.read(data, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:'', blankrows:false});

      // ── Name match analysis ───────────────────────────────────────────────
      // Find which column looks like expert names (header contains "expert", "doctor", "name")
      const headers = rows[0] || [];
      const nameColIdx = headers.findIndex(h =>
        String(h).toLowerCase().includes('expert') ||
        String(h).toLowerCase().includes('doctor') ||
        String(h).toLowerCase().includes('name') ||
        String(h).toLowerCase().includes('medical')
      );
      if (nameColIdx >= 0 && key === 'util') {
        const dataRows = rows.slice(1).filter(r => r[nameColIdx] && String(r[nameColIdx]).trim());
        const matched = [], unmatched = [];
        dataRows.forEach(row => {
          const uploadedName = String(row[nameColIdx]).trim();
          if (uploadedName.toLowerCase() === 'total' || uploadedName.toLowerCase() === 'grand total') return;
          const match = findMatch(uploadedName);
          if (match) {
            matched.push({uploaded: uploadedName, expert: match.expert, type: match.type});
          } else {
            unmatched.push(uploadedName);
          }
        });
        setMatchReport({key, matched, unmatched, headers, nameColIdx, totalRows: dataRows.length});
      }

      // ── Utilisation parsing (wide-format: months as column groups) ─────────────
      // Supports the actual Zoho Analytics export format:
      // Row 0: Month-Yr header cells (dates), repeated 4 times per month
      // Row 1: BOOKED | AVAILABLE | TOTAL | % sub-headers per month group
      // Row 2+: one row per doctor, data spread across columns
      if (key === 'util') {
        try {
          // Build column map: month_label -> {booked, available, total} col indices
          const headerRow = rows[0] || [];
          const subRow    = rows[1] || [];
          const colMap    = {}; // {'Jun 26': {booked:69, available:70, total:71}, ...}
          let curMonth    = null;

          for (let i = 0; i < headerRow.length; i++) {
            const h = headerRow[i];
            // Date objects come through as date strings or numbers from XLSX
            // XLSX parses dates as JS Date objects serialised to numbers (days since 1900)
            // But xlsx.utils.sheet_to_json with header:1 gives raw values
            // A month header will be a number (Excel date serial) or string like "Jan 25"
            if (h !== null && h !== '' && h !== undefined && String(h).toLowerCase() !== 'total') {
              // Try to parse as a month label
              let label = null;
              if (typeof h === 'number' && h > 40000 && h < 60000) {
                // Excel date serial — convert to "Mon YY"
                const d = new Date(Math.round((h - 25569) * 86400 * 1000));
                label = d.toLocaleDateString('en-AU', {month:'short', year:'2-digit', timeZone:'UTC'});
              } else if (typeof h === 'string' && /^[A-Za-z]+ \d{2}$/.test(h.trim())) {
                label = h.trim();
              } else if (h instanceof Date || (typeof h === 'object' && h && h.getFullYear)) {
                const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const yr = String(h.getUTCFullYear ? h.getUTCFullYear() : h.getFullYear()).slice(-2);
                const mo = h.getUTCMonth ? h.getUTCMonth() : h.getMonth();
                label = MONS[mo] + ' ' + yr;
              }
              if (label) {
                // Normalise label: "Oct 26" not "Oct 2026"
                // toLocaleDateString can give 2-digit or 4-digit year depending on locale
                // Normalise to always "Mon YY"
                const parts = label.split(' ');
                if (parts.length === 2 && parts[1].length === 4) {
                  label = parts[0] + ' ' + parts[1].slice(-2);
                }
                if (!colMap[label]) {
                  colMap[label] = {};
                  curMonth = label;
                }
              }
            }
            if (curMonth && subRow[i]) {
              const sub = String(subRow[i]).toUpperCase().trim();
              if (sub === 'BOOKED')    colMap[curMonth].booked    = i;
              if (sub === 'AVAILABLE') colMap[curMonth].available = i;
              if (sub === 'TOTAL')     colMap[curMonth].total     = i;
            }
          }

          // Determine which months to show: current month through Dec of current year
          const now = new Date();
          const curYr = String(now.getFullYear()).slice(-2);
          const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const targetMonths = [];
          for (let m = now.getMonth(); m <= 11; m++) {
            targetMonths.push(MONTH_ABBR[m] + ' ' + curYr);
          }

          // Parse each doctor row
          const byExpert = {};
          let matched = 0, unmatched = 0;
          for (let r = 2; r < rows.length; r++) {
            const row  = rows[r];
            const name = String(row[0] || '').trim();
            if (!name || name.toLowerCase() === 'total' || name.toLowerCase() === 'grand total') continue;
            const expertMatch = findMatch(name);
            if (!expertMatch) { unmatched++; continue; }
            matched++;

            const months = [];
            for (const mo of targetMonths) {
              const cols = colMap[mo];
              if (!cols || cols.booked === undefined) continue;
              const booked    = row[cols.booked]    != null ? parseInt(row[cols.booked])    || 0 : null;
              const available = row[cols.available] != null ? parseInt(row[cols.available]) || 0 : null;
              const total     = row[cols.total]     != null ? parseInt(row[cols.total])     || 0 : null;
              if (total === null && booked === null) continue; // no data this month
              const slots = total != null ? total : (booked || 0) + (available || 0);
              const filled = booked || 0;
              const pct = slots > 0 ? Math.round((filled / slots) * 100) : 0;
              months.push({mo, booked: filled, total: slots, pct});
            }
            if (months.length > 0) {
              byExpert[expertMatch.expert] = months;
              // Also update UTIL_DATA with first/current month
              UTIL_DATA[expertMatch.expert] = {...months[0]};
            }
          }

          Object.assign(MONTHLY_AVAIL_DATA, byExpert);
          if (sbReady) await sbSet('am_app_data', 'monthly_avail_data', {data: byExpert, ts: new Date().toISOString()});
          LATEST_MONTH = targetMonths[0]; // update global so cards show correct current month
          showToast('✓ Availability loaded — ' + Object.keys(byExpert).length + ' experts, ' + targetMonths.length + ' months (' + targetMonths[0] + ' – ' + targetMonths[targetMonths.length-1] + ')');
          if (sbReady) await sbSet('am_app_data', 'latest_month', {value: LATEST_MONTH, ts: new Date().toISOString()});
          if (unmatched > 0) showToast('⚠ ' + unmatched + ' expert names not matched — check spelling', 'err');
        } catch(parseErr) {
          showToast('✗ Availability parse error: ' + parseErr.message, 'err');
        }
      }

      // ── Master Case Details — extract scheme breakdown AND referrer data ─────
      // Expected columns: Medical Expert | Sector and Scheme | Referrer Contact | Referrer Account
      if (key === 'master') {
        const hdrs = (rows[0] || []).map(h => String(h).toLowerCase().trim());
        const schemeColIdx  = hdrs.findIndex(h => h.includes('sector') || h.includes('scheme'));
        const contactColIdx = hdrs.findIndex(h => (h.includes('referrer') && (h.includes('contact') || h.includes('name') || h.includes('person'))) || h === 'contact name' || h === 'referrer');
        const accountColIdx = hdrs.findIndex(h =>
          (h.includes('referrer') && (h.includes('account') || h.includes('org') || h.includes('company') || h.includes('firm') || h.includes('insurer') || h.includes('law') || h.includes('practice'))) ||
          h === 'account name' || h === 'organisation' || h === 'organization' ||
          h === 'account' || h === 'company' || h === 'firm' || h === 'law firm' ||
          h === 'insurer' || h === 'employer' || h === 'referrer account' || h === 'referrer organisation' || h === 'referrer organization'
        );

        // Scheme tally: {expertName: {scheme: count}}
        const schemeTally = {};
        // Referrer tally: {expertName: {key: {person, org, count}}}
        const refTally = {};

        rows.slice(1).forEach(row => {
          const rawName = String(row[nameColIdx] || '').trim();
          if (!rawName || rawName.toLowerCase() === 'total') return;
          const match = findMatch(rawName);
          if (!match) return;
          const n = match.expert;

          // Schemes
          if (schemeColIdx >= 0) {
            const scheme = String(row[schemeColIdx] || '').trim();
            if (scheme) {
              if (!schemeTally[n]) schemeTally[n] = {};
              schemeTally[n][scheme] = (schemeTally[n][scheme] || 0) + 1;
            }
          }

          // Referrers
          const person = contactColIdx >= 0 ? String(row[contactColIdx] || '').trim() : '';
          const org    = accountColIdx >= 0 ? String(row[accountColIdx] || '').trim() : '';
          if (person || org) {
            const key = (person + '||' + org).toLowerCase();
            if (!refTally[n]) refTally[n] = {};
            if (!refTally[n][key]) refTally[n][key] = {person, org, count: 0};
            refTally[n][key].count++;
          }
        });

        // Build scheme data
        const schemeByExpert = {};
        Object.keys(schemeTally).forEach(n => {
          schemeByExpert[n] = Object.entries(schemeTally[n])
            .sort((a,b) => b[1] - a[1]).slice(0, 8)
            .map(([scheme, count]) => ({scheme, count}));
        });
        if (Object.keys(schemeByExpert).length) {
          Object.assign(SCHEME_DATA, schemeByExpert);
          if (sbReady) await sbSet('am_app_data', 'scheme_data', {data: schemeByExpert, ts: new Date().toISOString()});
        }

        // Build referrer data
        const refByExpert = {};
        Object.keys(refTally).forEach(n => {
          refByExpert[n] = Object.values(refTally[n])
            .sort((a,b) => b.count - a.count).slice(0, 10);
        });
        if (Object.keys(refByExpert).length) {
          Object.assign(REFERRER_DATA, refByExpert);
          if (sbReady) await sbSet('am_app_data', 'referrer_data', {data: refByExpert, ts: new Date().toISOString()});
        }

        const schemeCount = Object.keys(schemeByExpert).length;
        const refCount    = Object.keys(refByExpert).length;
        if (schemeCount || refCount) {
          showToast(`✓ Master cases parsed — ${schemeCount} experts with scheme data, ${refCount} with referrer data`);
        } else {
          showToast('⚠ Master case upload — could not detect scheme or referrer columns', 'err');
        }
      }

      // ── Top referrers parsing ────────────────────────────────────────────────
      // Expects columns: Medical Expert | Contact Name (optional) | Organisation | Count
      if (key === 'referrers') {
        const hdrs = (rows[0] || []).map(h => String(h).toLowerCase().trim());
        const orgColIdx   = hdrs.findIndex(h => h.includes('org') || h.includes('company') || h.includes('firm') || h.includes('account') || h.includes('referrer'));
        const countColIdx = hdrs.findIndex(h => h.includes('count') || h.includes('booking') || h.includes('total') || h.includes('number'));
        const personColIdx = hdrs.findIndex(h => h.includes('contact') || h.includes('person') || h.includes('first') || h.includes('last') || h === 'name');
        if (nameColIdx >= 0 && orgColIdx >= 0 && countColIdx >= 0) {
          const byExpert = {};
          rows.slice(1).forEach(row => {
            const name = String(row[nameColIdx] || '').trim();
            if (!name || name.toLowerCase() === 'total') return;
            const match = findMatch(name);
            if (!match) return;
            const org   = String(row[orgColIdx]   || '').trim();
            const count = parseInt(row[countColIdx]) || 0;
            const person = personColIdx >= 0 ? String(row[personColIdx] || '').trim() : '';
            if (!org || !count) return;
            if (!byExpert[match.expert]) byExpert[match.expert] = [];
            byExpert[match.expert].push({org, count, person});
          });
          Object.keys(byExpert).forEach(n => {
            byExpert[n].sort((a,b) => b.count - a.count);
            byExpert[n] = byExpert[n].slice(0, 10);
          });
          Object.assign(REFERRER_DATA, byExpert);
          if (sbReady) await sbSet('am_app_data', 'referrer_data', {data: byExpert, ts: new Date().toISOString()});
          showToast(`✓ Top referrers loaded — ${Object.keys(byExpert).length} experts`);
        } else {
          showToast('⚠ Could not detect referrer columns. Expected: Expert, Organisation, Count', 'err');
        }
      }

      // Save to Supabase if available
      if (sbReady) {
        await sbSet('am_report_data', key, {rows: rows.slice(0,500), filename: file.name, ts: new Date().toISOString()});
        await sbSet('am_report_data', key+'_meta', {filename: file.name, rows: rows.length, ts: new Date().toISOString()});
      }
      setLastUploaded(p => ({...p, [key]: {filename: file.name, rows: rows.length, ts: new Date().toLocaleTimeString('en-AU')}}));
      setStatus(p => ({...p, [key]: 'ok'}));
      if (key !== 'util' && key !== 'referrers' && key !== 'master') showToast('✓ ' + file.name + ' uploaded (' + rows.length + ' rows)');
    } catch(e) {
      setStatus(p => ({...p, [key]: 'error'}));
      showToast('✗ Upload failed: ' + e.message, 'err');
    }
  }, [showToast, expertNames]);

  const requiredCount = REPORT_MANIFEST.filter(r=>r.required).length;
  const uploadedRequired = REPORT_MANIFEST.filter(r=>r.required && status[r.key]==='ok').length;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:200,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:40,overflowY:'auto'}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:740,margin:'0 20px 40px',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:'#0f172a',padding:'18px 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:16}}>▲ Upload Reports</div>
            <div style={{color:'#64748b',fontSize:11,marginTop:2}}>Keep performance data current — upload weekly on Mondays after Zoho exports</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontSize:11,color:uploadedRequired===requiredCount?'#22c55e':'#f59e0b',fontWeight:600}}>
              {uploadedRequired}/{requiredCount} required uploaded this session
            </div>
            <button onClick={onClose} style={{background:'#1e293b',border:'none',color:'#94a3b8',cursor:'pointer',padding:'6px 10px',borderRadius:6,fontSize:13}}>✕ Close</button>
          </div>
        </div>

        {/* Required section */}
        <div style={{padding:'20px 24px 0'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#dc2626',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#dc2626',display:'inline-block'}}/>
            Required weekly uploads
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:10,marginBottom:20}}>
            {REPORT_MANIFEST.filter(r=>r.required).map(r => (
              <UploadCard key={r.key} report={r} status={status[r.key]} lastUploaded={lastUploaded[r.key]} onFile={handleFile}/>
            ))}
          </div>

          <div style={{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#9ca3af',display:'inline-block'}}/>
            Optional uploads
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:10,marginBottom:24}}>
            {REPORT_MANIFEST.filter(r=>!r.required).map(r => (
              <UploadCard key={r.key} report={r} status={status[r.key]} lastUploaded={lastUploaded[r.key]} onFile={handleFile}/>
            ))}
          </div>
        </div>

        {/* Name Match Report */}
        {matchReport && (
          <div style={{margin:'0 24px 24px',border:'1px solid #e5e7eb',borderRadius:10,overflow:'hidden'}}>
            <div style={{background:'#0f172a',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}}
              onClick={()=>setShowMatchReport(p=>!p)}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{color:'#fff',fontWeight:600,fontSize:13}}>🔍 Name match report — Utilisation upload</span>
                <span style={{padding:'1px 8px',borderRadius:10,background:matchReport.unmatched.length===0?'#16a34a':'#ef4444',color:'#fff',fontSize:11,fontWeight:700}}>
                  {matchReport.unmatched.length === 0
                    ? `✓ All ${matchReport.matched.length} matched`
                    : `⚠ ${matchReport.unmatched.length} unmatched`}
                </span>
                {matchReport.matched.filter(m=>m.type==='partial').length > 0 && (
                  <span style={{padding:'1px 8px',borderRadius:10,background:'#f59e0b',color:'#fff',fontSize:11,fontWeight:700}}>
                    {matchReport.matched.filter(m=>m.type==='partial').length} fuzzy
                  </span>
                )}
              </div>
              <span style={{color:'#64748b',fontSize:12}}>{showMatchReport ? '▲ Hide' : '▼ Show'}</span>
            </div>

            {showMatchReport && (
              <div style={{maxHeight:360,overflowY:'auto'}}>
                {matchReport.unmatched.length > 0 && (
                  <div style={{padding:'12px 16px',background:'#fef2f2',borderBottom:'1px solid #fecaca'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#dc2626',marginBottom:6}}>
                      ✗ {matchReport.unmatched.length} names NOT matched — these rows will NOT update utilisation
                    </div>
                    <div style={{fontSize:11,color:'#9ca3af',marginBottom:8}}>Check spelling or add the expert to the app roster</div>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {matchReport.unmatched.map((name,i) => (
                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 8px',background:'#fff',borderRadius:5,border:'1px solid #fecaca'}}>
                          <span style={{color:'#dc2626',fontSize:12,fontWeight:700}}>✗</span>
                          <span style={{fontSize:12,color:'#374151',fontFamily:'monospace'}}>{name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {matchReport.matched.filter(m=>m.type==='partial').length > 0 && (
                  <div style={{padding:'12px 16px',background:'#fffbeb',borderBottom:'1px solid #fde68a'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#d97706',marginBottom:6}}>
                      ~ {matchReport.matched.filter(m=>m.type==='partial').length} fuzzy matches — verify these are correct
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {matchReport.matched.filter(m=>m.type==='partial').map((m,i) => (
                        <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px',background:'#fff',borderRadius:5,border:'1px solid #fde68a'}}>
                          <span style={{fontSize:12,color:'#d97706',fontWeight:700}}>~</span>
                          <span style={{fontSize:12,color:'#374151',fontFamily:'monospace',flex:1}}>{m.uploaded}</span>
                          <span style={{fontSize:11,color:'#9ca3af'}}>matched to</span>
                          <span style={{fontSize:12,color:'#92400e',fontFamily:'monospace',fontWeight:600}}>{m.expert}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {matchReport.matched.filter(m=>m.type==='exact').length > 0 && (
                  <div style={{padding:'12px 16px'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#15803d',marginBottom:8}}>
                      ✓ {matchReport.matched.filter(m=>m.type==='exact').length} exact matches
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {matchReport.matched.filter(m=>m.type==='exact').map((m,i) => (
                        <span key={i} style={{fontSize:11,padding:'2px 8px',background:'#f0fdf4',color:'#15803d',borderRadius:10,border:'1px solid #bbf7d0'}}>{m.expert}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

function UploadCard({report, status, lastUploaded, onFile}) {
  const [drag, setDrag] = useState(false);
  const isOk      = status === 'ok';
  const isLoading = status === 'loading';
  const isError   = status === 'error';
  const borderCol = isOk?'#16a34a':isError?'#dc2626':drag?'#0066CC':'#e5e7eb';
  const bgCol     = isOk?'#f0fdf4':isError?'#fef2f2':drag?'#f0f7ff':'#fafafa';
  return (
    <div
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)onFile(f,report.key);}}
      style={{border:`1.5px dashed ${borderCol}`,borderRadius:10,padding:'12px',background:bgCol,transition:'all .15s',position:'relative'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:20}}>{report.icon}</span>
        {isOk     && <span style={{fontSize:11,color:'#16a34a',fontWeight:700}}>✓ Uploaded</span>}
        {isError  && <span style={{fontSize:11,color:'#dc2626',fontWeight:700}}>✗ Error</span>}
        {isLoading && <span style={{fontSize:11,color:'#6b7280'}}>Parsing…</span>}
      </div>
      <div style={{fontSize:12,fontWeight:700,color:'#0f172a',marginBottom:3}}>{report.label}</div>
      <div style={{fontSize:9,color:'#9ca3af',fontFamily:'monospace',marginBottom:5,wordBreak:'break-all'}}>{report.filename}</div>
      <div style={{fontSize:10,color:'#6b7280',lineHeight:1.4,marginBottom:8}}>{report.updates}</div>
      <div style={{fontSize:9,color:'#94a3b8',lineHeight:1.3,marginBottom:8,padding:'5px 7px',background:'#f8fafc',borderRadius:5,border:'1px solid #f1f5f9'}}>
        <span style={{fontWeight:600,color:'#64748b'}}>Export from: </span>{report.source}
      </div>
      {lastUploaded && (
        <div style={{fontSize:10,color:'#16a34a',marginBottom:6}}>
          ✓ {lastUploaded.filename} ({lastUploaded.rows} rows) at {lastUploaded.ts}
        </div>
      )}
      <label style={{display:'block',textAlign:'center',padding:'6px',background:isOk?'#dcfce7':'#0066CC',color:isOk?'#15803d':'#fff',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:isOk?'1px solid #86efac':'none'}}>
        {isOk?'Replace file':'Choose file'}
        <input type="file" accept=".xlsx,.csv" onChange={e=>{const f=e.target.files[0];if(f)onFile(f,report.key);e.target.value='';}} style={{display:'none'}}/>
      </label>
    </div>
  );
}

// ── Loading skeleton ──────────────────────────────────────────────────────────
function LoadingSkeleton() {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {[...Array(8)].map((_,i)=>(
        <div key={i} style={{background:'#fff',borderRadius:9,padding:'14px',border:'1px solid #f3f4f6',opacity:1-i*0.08}}>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:'#f3f4f6'}}/>
            <div style={{flex:1}}>
              <div style={{height:12,background:'#f3f4f6',borderRadius:4,width:'55%',marginBottom:6}}/>
              <div style={{height:10,background:'#f9fafb',borderRadius:4,width:'35%'}}/>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
