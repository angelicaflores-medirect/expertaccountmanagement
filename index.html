function relDate(ts) {

}

  if (!ts) return 999;

}

// ── Priority scoring ──────────────────────────────────────────────────────────
// ── Scoring system ───────────────────────────────────────────────────────────
// attentionScore: 0-100+ — reasons this expert needs action now
// healthScore:    0-100  — relationship quality indicator
// engagementBand: 'strong' | 'regular' | 'low' | 'cold' | 'none'

function scoreExpert(expert, commsData) {
  const comms = commsData[expert.name] || {logs:[], notes:'', training:{}};
  const logs  = comms.logs || [];
  const tier  = getTier(expert.name);
  const util  = UTIL_DATA[expert.name];
  const stats = EXP_STATS[expert.name];
  const rev   = REV_DATA[expert.name];

  const lastContact     = logs.length ? logs[0].ts : null;
  const dsc             = daysSince(lastContact);             // days since contact
  const isActive        = ['Recruited','Casual'].includes(expert.status);
  const isNewRecruit    = !['Recruited','Casual','Sabbatical'].includes(expert.status);
  const tierWeight      = tier === 'A' || tier === 'High Potential' ? 1.5 : tier === 'B' ? 1.2 : 1.0;
  const trainingDone    = Object.values(comms.training||{}).filter(Boolean).length;
  const trainingPct     = trainingDone / TRAINING_ITEMS.length;
  const hasTags         = (comms.tags||[]).length > 0;
  const hasIssueFlag    = (comms.tags||[]).some(t => ['needs_attention','report_quality','report_tat','availability'].includes(t));
  const hasIssueLogs    = logs.some(l => l.type === 'issue');
  const pendingTasks    = logs.filter(l => l.type === 'task' && !l.taskDone).length;
  const logsLast30      = logs.filter(l => l.ts && daysSince(l.ts) <= 30).length;
  const logsLast90      = logs.filter(l => l.ts && daysSince(l.ts) <= 90).length;
  const daysSinceInv    = stats && stats.last ? daysSince(new Date(stats.last).getTime()) : null;

  // ── Attention score (reasons to act) ──────────────────────────────────────
  let attention = 0;
  const reasons = [];

  // Overdue contact — weighted by tier
  if (!lastContact) {
    attention += Math.round(50 * tierWeight);
    reasons.push({label: 'Never contacted', severity: 'high'});
  } else if (dsc > 30) {
    attention += Math.round(45 * tierWeight);
    reasons.push({label: `No contact ${dsc}d`, severity: 'high'});
  } else if (dsc > 21) {
    attention += Math.round(30 * tierWeight);
    reasons.push({label: `No contact ${dsc}d`, severity: 'med'});
  } else if (dsc > 14) {
    attention += Math.round(15 * tierWeight);
    reasons.push({label: `No contact ${dsc}d`, severity: 'low'});
  }

  // New recruit / in-progress not yet training complete
  if (isNewRecruit) {
    attention += 25;
    reasons.push({label: 'Onboarding active', severity: 'med'});
    if (trainingPct < 0.5) {
      attention += 15;
      reasons.push({label: 'Training <50%', severity: 'med'});
    }
  }

  // Issue flags
  if (hasIssueLogs || hasIssueFlag) {
    attention += 20;
    reasons.push({label: 'Issue flagged', severity: 'high'});
  }

  // Pending tasks
  if (pendingTasks > 0) {
    attention += 10 * Math.min(pendingTasks, 3);
    reasons.push({label: `${pendingTasks} pending task${pendingTasks>1?'s':''}`, severity: 'med'});
  }

  // High-tier expert with low engagement
  if (isActive && (tier === 'A' || tier === 'High Potential')) {
    if (logsLast30 === 0) {
      attention += 20;
      reasons.push({label: 'Tier A — no contact this month', severity: 'high'});
    }
    if (daysSinceInv !== null && daysSinceInv > 45) {
      attention += 20;
      reasons.push({label: `No invoice ${daysSinceInv}d`, severity: 'high'});
    }
  } else if (isActive && tier === 'B') {
    if (daysSinceInv !== null && daysSinceInv > 60) {
      attention += 15;
      reasons.push({label: `No invoice ${daysSinceInv}d`, severity: 'med'});
    }
  }

  // Revenue decline
  if (rev && rev.prev > 0 && rev.yoy <= -25) {
    attention += 15;
    reasons.push({label: `Revenue ${rev.yoy}% YoY`, severity: 'high'});
  }

  // ── Health score (0–100, higher = healthier relationship) ─────────────────
  let health = 50; // baseline

  // Recent contact cadence
  if      (dsc <= 7)  health += 25;
  else if (dsc <= 14) health += 15;
  else if (dsc <= 30) health += 5;
  else if (dsc <= 60) health -= 10;
  else                health -= 25;

  // Interaction volume — consistent engagement
  if      (logsLast30 >= 4) health += 15;
  else if (logsLast30 >= 2) health += 8;
  else if (logsLast30 === 0 && logsLast90 === 0) health -= 15;

  // Mix of interaction types (calls + emails + meetings = varied = healthy)
  const interactionTypes = new Set(logs.slice(0,20).map(l=>l.type)).size;
  if (interactionTypes >= 3) health += 5;

  // Training completion (for active onboarding)
  if (isNewRecruit) {
    health += Math.round((trainingPct - 0.5) * 20);
  }

  // Issue flags drag health
  if (hasIssueLogs || hasIssueFlag) health -= 20;
  if (pendingTasks > 0)             health -= 5 * pendingTasks;

  // Revenue growth = good sign
  if (rev && rev.prev > 0 && rev.yoy >= 10) health += 10;
  else if (rev && rev.prev > 0 && rev.yoy <= -25) health -= 10;

  health = Math.max(0, Math.min(100, health));

  // ── Engagement band ───────────────────────────────────────────────────────
  let band;
  if      (!lastContact)         band = 'none';
  else if (dsc <= 7  && logsLast30 >= 3) band = 'strong';
  else if (dsc <= 14 && logsLast30 >= 2) band = 'regular';
  else if (dsc <= 30)            band = 'low';
  else                           band = 'cold';

  return {attention: Math.round(attention), health, band, reasons};
}

function hasTierChanged(name, commsData) {

// ── Weekly export ─────────────────────────────────────────────────────────────
function exportAllComms(commsData, expertSource) {
  const rows = [];
  rows.push(['Expert','Specialty','AM','Status','Tier','Date','Type','Logged By','Notes','Tags','Task Done','Onboarding %','Training %','Recruited Date']);
  expertSource.forEach(expert => {
    const comms = commsData[expert.name] || {logs:[], notes:'', training:{}, onboarding:{}};
    const logs = comms.logs || [];
    const tier = ZOHO_TIERS[expert.name] || '';
    const trainingPct = Math.round(Object.values(comms.training||{}).filter(Boolean).length / TRAINING_ITEMS.length * 100);
    const onboardingPct = Math.round(ONBOARDING_ACTIONS.filter(a => comms.onboarding && comms.onboarding[a.id] && comms.onboarding[a.id].done).length / ONBOARDING_ACTIONS.length * 100);
    if (logs.length === 0) {
      rows.push([expert.name, expert.spec, expert.am, expert.status, tier, '', '', '', comms.notes||'', (comms.tags||[]).join('; '), '', onboardingPct+'%', trainingPct+'%', comms.recruited_date ? new Date(comms.recruited_date).toLocaleDateString('en-AU') : '']);
    } else {
      logs.forEach((log, i) => {
        rows.push([
          i===0 ? expert.name : '',
          i===0 ? expert.spec : '',
          i===0 ? expert.am : '',
          i===0 ? expert.status : '',
          i===0 ? tier : '',
          log.ts ? new Date(log.ts).toLocaleDateString('en-AU') : '',
          log.type || '',
          log.by || '',
          log.note || '',
          i===0 ? (comms.tags||[]).join('; ') : '',
          log.taskDone ? 'Yes' : (log.type==='task' ? 'Pending' : ''),
          i===0 ? onboardingPct+'%' : '',
          i===0 ? trainingPct+'%' : '',
          i===0 && comms.recruited_date ? new Date(comms.recruited_date).toLocaleDateString('en-AU') : '',
        ]);
      });
    }
  });
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'MEDirect_AM_Export_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

    const entry = {type:'note', note:'🆕 Expert flagged as new recruit — 90-day onboarding started', ts: Date.now(), by:'system', id: Date.now()};
    const withLog = {...updated, logs: [entry, ...(updated.logs||[])]};
    setCommsData(prev => ({...prev, [name]: withLog}));
    await sbSet('expert_am_comms', name, withLog);
    showToast('✓ ' + name + ' flagged as new recruit');
  }, [commsData, showToast]);

  // Expert source — EXPERTS_RAW is populated from Supabase (or seed) at startup
  const expertSource = useMemo(()=>{
    return EXPERTS_RAW.map(function(r){ return {name:r[0],spec:r[1],am:r[2],status:r[3],tier:ZOHO_TIERS[r[0]]||null}; });
  },[loading]);  // re-derive after loading completes

  // Filtered + sorted expert list
  const filteredExperts = useMemo(()=>{
    let list = expertSource.map(e=>({...e}));
    // Apply all filters first
    if (activeAM !== 'All') list = list.filter(e => e.am === activeAM);
    if (filterSt !== 'All') list = list.filter(e => e.status === filterSt);
    if (filterSpec !== 'All') list = list.filter(e => e.spec === filterSpec);
    if (filterTier === 'none') list = list.filter(e => !getTier(e.name));
    else if (filterTier !== 'All') list = list.filter(e => getTier(e.name) === filterTier);
    if (filterPri)  list = list.filter(e => scoreExpert(e, commsData).attention >= 25);
    if (filterBand !== 'All') list = list.filter(e => scoreExpert(e, commsData).band === filterBand);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(e => e.name.toLowerCase().includes(q) || e.spec.toLowerCase().includes(q));
    }
    // Sort — overdue follow-ups first, then by attention score, then last activity
    function earliestFollowUp(name) {
      const logs = commsData[name]?.logs || [];
      const upcoming = logs
        .filter(l => l.followUp && !l.followUpDone)
        .map(l => new Date(l.followUp).getTime())
        .sort((a,b) => a-b);
      return upcoming.length ? upcoming[0] : null;
    }
    const nowTs = Date.now();
    list.sort((a,b) => {
      const fa = earliestFollowUp(a.name);
      const fb = earliestFollowUp(b.name);
      const aOverdue = fa && fa < nowTs;
      const bOverdue = fb && fb < nowTs;
      // Overdue follow-ups float to top
      if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
      // Both overdue: most overdue first
      if (aOverdue && bOverdue) return fa - fb;
      // Upcoming follow-ups (within 7 days) next
      const aSoon = fa && fa > nowTs && (fa - nowTs) < 7*86400000;
      const bSoon = fb && fb > nowTs && (fb - nowTs) < 7*86400000;
      if (aSoon !== bSoon) return aSoon ? -1 : 1;
      if (aSoon && bSoon) return fa - fb;
      // Then by attention score
      const pa = scoreExpert(a, commsData).attention;
      const pb = scoreExpert(b, commsData).attention;
      if (pa !== pb) return pb - pa;
      // Then last activity
      const la = (commsData[a.name]?.logs||[])[0]?.ts || 0;
      const lb = (commsData[b.name]?.logs||[])[0]?.ts || 0;
      if (la !== lb) return lb - la;
      return a.name.localeCompare(b.name);
    });
    return list;
  },[activeAM, filterSt, filterSpec, filterTier, filterPri, filterBand, search, commsData, expertSource]);

  // Stats per AM
  const amStats = useMemo(()=>{
    const stats = {};
    ALL_AMS.forEach(am => {
      const experts = EXPERTS_RAW.filter(([,,,]) => true).map(([n,s,a,st])=>({name:n,spec:s,am:a,status:st})).filter(e=>e.am===am);
      const needsContact = experts.filter(e => daysSince((commsData[e.name]?.logs||[])[0]?.ts) > 14).length;
      const newRecruits = experts.filter(e => e.status !== 'Recruited').length;
      const tierA = experts.filter(e => getTier(e.name) === 'A' || getTier(e.name) === 'High Potential').length;
      stats[am] = {total: experts.length, needsContact, newRecruits, tierA};
    });
    return stats;
  },[commsData]);

  return (
    <div style={{minHeight:'100vh', background:'#F0F2F7', fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {/* Setup banner — shown when Supabase not configured */}
      {!sbReady && !loading && (
        <div style={{background:'#78350f',padding:'8px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <span style={{fontSize:12,color:'#fef3c7',fontWeight:500}}>
            ⚠ Supabase not configured — performance data loads from seed, but notes and interactions will only persist within this browser session. Add <code style={{background:'#92400e',padding:'1px 6px',borderRadius:3}}>medirect-cloud-config.js</code> to enable permanent storage.
          </span>
          <button onClick={syncFromZoho} disabled={syncing}
            style={{padding:'5px 12px',background:'#f59e0b',color:'#1c1917',border:'none',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
            Push to Supabase
          </button>
        </div>
      )}

      {/* Top bar */}
      <TopBar activeAM={activeAM} setActiveAM={setActiveAM} amStats={amStats} sbReady={sbReady} onSync={syncFromZoho} syncing={syncing} syncMeta={syncMeta} onUpload={()=>setShowUpload(true)} onExport={()=>exportAllComms(commsData, expertSource)} onSyncStaff={syncSupportStaff} syncingStaff={syncingStaff}/>

      {/* Body */}
      <div style={{maxWidth:1320, margin:'0 auto', padding:'20px 20px', display:'grid', gridTemplateColumns: selected ? '380px 1fr' : '1fr', gap:16, alignItems:'start'}}>

        {/* Left: expert list */}
        <div>
          <ListControls search={search} setSearch={setSearch} filterSt={filterSt} setFilterSt={setFilterSt} filterTier={filterTier} setFilterTier={setFilterTier} filterSpec={filterSpec} setFilterSpec={setFilterSpec} filterPri={filterPri} setFilterPri={setFilterPri} filterBand={filterBand} setFilterBand={setFilterBand} count={filteredExperts.length}/>
          {loading
            ? <LoadingSkeleton/>
            : <ExpertList experts={filteredExperts} commsData={commsData} selected={selected} onSelect={setSelected} activeAM={activeAM}/>
          }
        </div>

        {/* Right: detail panel */}
        {selected && (
          <ExpertPanel
            key={selected.name}
            expert={selected}
            comms={commsData[selected.name] || {logs:[], notes:'', training:{}}}
            onSave={rec => saveComms(selected.name, rec)}
            onClose={()=>setSelected(null)}
            showToast={showToast}
            onFlagNew={()=>flagNewRecruit(selected.name)}
            zohoContacts={zohoContacts[selected.name]}
            onZohoFetch={async(name)=>{
              // Fetch from Zoho via MCP if connected — stub for now
              setZohoContacts(p=>({...p,[name]:'loading'}));
              setTimeout(()=>setZohoContacts(p=>({...p,[name]:[]})),800);
            }}
          />
        )}
      </div>

      {/* Upload modal */}
      {showUpload && <UploadModal onClose={()=>setShowUpload(false)} showToast={showToast}/>}

      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:toast.type==='ok'?'#0f172a':'#dc2626',color:'#fff',padding:'10px 20px',borderRadius:8,fontSize:13,fontWeight:600,boxShadow:'0 4px 16px rgba(0,0,0,.2)',zIndex:999}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

  const logs = comms.logs || [];

  const days = daysSince(lastLog?.ts);
  const {attention, health, band, reasons} = scoreExpert(expert, {[expert.name]: comms});
  const isHigh = attention >= 50;
  const isMed  = attention >= 25 && attention < 50;
  const trainingDone = Object.values(comms.training||{}).filter(Boolean).length;
  const amCol = AM_COLORS[expert.am]?.main || '#6b7280';
  const stMeta = STATUS_META[expert.status] || STATUS_META['Recruited'];
  const bandMeta = BAND_META[band];

  return (
    <div onClick={onClick} style={{
      background:'#fff',
      border:`1px solid ${isSelected?amCol:bandMeta.border}`,
      borderLeft: `4px solid ${isHigh?'#ef4444':isMed?'#f59e0b':bandMeta.color}`,
      borderRadius:9,
      padding:'11px 13px',
      cursor:'pointer',

      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {/* Avatar */}

        {/* Name + spec */}

          <div style={{fontWeight:600,fontSize:13,color:'#0f172a',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {expert.name}

          <div style={{fontSize:11,color:'#64748b',marginTop:1}}>{expert.spec}</div>
        </div>

        {/* Right meta */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            {activeAM === 'All' && expert.am && (
              <span style={{padding:'1px 7px',background:AM_COLORS[expert.am]?.light||'#f3f4f6',color:AM_COLORS[expert.am]?.text||'#374151',borderRadius:10,fontSize:10,fontWeight:600}}>
                {expert.am}
              </span>
            )}
            <span style={{padding:'1px 7px',background:stMeta.bg,color:stMeta.color,borderRadius:10,fontSize:10,fontWeight:600}}>
              {stMeta.label}
            </span>

              {bandMeta.icon} {bandMeta.label}
            </span>
            {attention > 0 && (
              <span style={{fontSize:10,fontWeight:600,padding:'1px 7px',background:isHigh?'#fef2f2':isMed?'#fffbeb':'#f8faff',color:isHigh?'#dc2626':isMed?'#d97706':'#6b7280',borderRadius:10}}>
                ⚡ {attention} attn
              </span>
            )}
          </div>
        </div>
      </div>

      {/* Training progress if in progress */}
      {expert.status !== 'Recruited' && (
        <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,height:3,background:'#f3f4f6',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:'#d97706',width:`${(trainingDone/TRAINING_ITEMS.length)*100}%`,borderRadius:4}}/>
          </div>
          <span style={{fontSize:10,color:'#d97706',fontWeight:500}}>{trainingDone}/{TRAINING_ITEMS.length}</span>
        </div>
      )}

      {/* Performance pills */}
      {(()=>{
        const util  = UTIL_DATA[expert.name];
        const stats = EXP_STATS[expert.name];
        const rev   = REV_DATA[expert.name];
        const nb    = NB_DATA[expert.name];
        if (!util && !stats && !rev) return null;
        return (
          <div style={{marginTop:7,display:'flex',gap:5,flexWrap:'wrap'}}>

              <span style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:util.pct>=80?'#f0fdf4':util.pct>=50?'#fffbeb':'#fef2f2',color:util.pct>=80?'#15803d':util.pct>=50?'#92400e':'#dc2626',fontWeight:600}}>
                📊 {util.pct}% util
              </span>
            )}
            {rev && rev.cur > 0 && (
              <span style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:'#f0f9ff',color:'#0369a1',fontWeight:500}}>
                💰 ${Math.round(rev.cur/1000)}k
              </span>
            )}
            {nb && nb > 0 && (
              <span style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:'#f5f3ff',color:'#6d28d9',fontWeight:500}}>
                📋 {nb} bookings
              </span>
            )}
            {stats && stats.last && (()=>{
              const d = daysSince(new Date(stats.last).getTime());
              if (d > 30) return <span style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:'#fef2f2',color:'#dc2626',fontWeight:600}}>⚠ No inv {d}d</span>;
              return null;
            })()}
            {/* Attention tags */}
            {(()=>{
              const expertTags = (comms.tags||[]);
              const activeTags = ATTENTION_TAGS.filter(t=>expertTags.includes(t.v));
              return activeTags.slice(0,2).map(tag=>(
                <span key={tag.v} style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:tag.bg,color:tag.color,fontWeight:600}}>{tag.icon} {tag.label}</span>
              ));
            })()}
            {/* Pending tasks */}
            {(()=>{
              const pendingTasks=(comms.logs||[]).filter(l=>l.type==='task'&&!l.taskDone).length;
              return pendingTasks>0?<span style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:'#ecfeff',color:'#0891b2',fontWeight:600}}>✅ {pendingTasks} task{pendingTasks>1?'s':''}</span>:null;
            })()}
          </div>
        );
      })()}
      {/* Follow-up indicator on card */}
      {(()=>{
        const allLogs = comms.logs || [];
        const fueLogs = allLogs.filter(l=>l.followUp && !l.followUpDone);
        if (fueLogs.length === 0) return null;
        const earliest = fueLogs.map(l=>({...l,d:daysUntilAEST(l.followUp)})).sort((a,b)=>a.d-b.d)[0];
        const overdue = earliest.d < 0;
        const today = earliest.d === 0;
        const soon = earliest.d > 0 && earliest.d <= 3;
        return (
          <div style={{marginTop:5,padding:'3px 8px',background:overdue?'#fef2f2':today||soon?'#fffbeb':'#f5f3ff',borderRadius:5,border:`1px solid ${overdue?'#fecaca':today||soon?'#fde68a':'#c4b5fd'}`,display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:11}}>📅</span>
            <span style={{fontSize:10,fontWeight:600,color:overdue?'#dc2626':today||soon?'#d97706':'#7c3aed'}}>
              {overdue ? `Follow-up ${Math.abs(earliest.d)}d overdue` : today ? 'Follow-up today' : earliest.d===1 ? 'Follow-up tomorrow' : `Follow-up in ${earliest.d}d`}
            </span>
          </div>
        );
      })()}

      {/* Last activity */}
      {lastLog ? (
        <div style={{marginTop:5,padding:'5px 8px',background:'#fafafa',borderRadius:5,border:'1px solid #f1f5f9',display:'flex',gap:6,alignItems:'flex-start'}}>
          <span style={{flexShrink:0}}>{COMM_TYPES.find(c=>c.v===lastLog.type)?.icon || '•'}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:'#9ca3af',marginBottom:1}}>{fmtTs(lastLog.ts)}{lastLog.by?' · '+lastLog.by:''}</div>
            <div style={{fontSize:11,color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lastLog.note}</div>
          </div>
        </div>
      ) : (
        <div style={{marginTop:5,padding:'4px 8px',background:'#fef2f2',borderRadius:5,border:'1px solid #fecaca'}}>
          <span style={{fontSize:11,color:'#ef4444',fontWeight:500}}>No interactions logged</span>
        </div>
      )}
    </div>
  );
}

// ── AEST date helpers (global) ───────────────────────────────────────────────
function nowAEST() {
  return new Date(new Date().toLocaleString('en-US', {timeZone: 'Australia/Sydney'}));
}
function todayAEST() {
  const d = nowAEST();
  return d.toISOString().split('T')[0];
}
function daysUntilAEST(dateStr) {
  if (!dateStr) return null;
  const now = nowAEST();
  now.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.ceil((target - now) / 86400000);
}

// ── Upload Modal ──────────────────────────────────────────────────────────────

function UploadModal({onClose, showToast}) {
  const [status, setStatus] = useState({});
  const [lastUploaded, setLastUploaded] = useState({});
  const [matchReport, setMatchReport] = useState(null); // {key, matched, unmatched, headers}
  const [showMatchReport, setShowMatchReport] = useState(false);

  // Fuzzy name normaliser — strips titles, extra spaces, lowercases
  function normaliseName(n) {
    if (!n) return '';
    return String(n)
      .replace(/\b(dr|prof|mr|ms|mrs|assoc|a\/prof)\b\.?/gi, '')
      .replace(/\b(AM|OAM|AO|OBE)\b/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  // Build lookup of all expert names (normalised)
  const expertNames = useMemo(() => {
    return EXPERTS_RAW.map(r => ({raw: r[0], norm: normaliseName(r[0])}));
  }, []);

  function findMatch(uploadedName) {
    const norm = normaliseName(uploadedName);
    // Exact normalised match
    const exact = expertNames.find(e => e.norm === norm);
    if (exact) return {expert: exact.raw, type: 'exact'};
    // Partial match — uploaded name contains expert name or vice versa
    const partial = expertNames.find(e => norm.includes(e.norm) || e.norm.includes(norm));
    if (partial) return {expert: partial.raw, type: 'partial'};
    return null;
  }

  const handleFile = useCallback(async (file, key) => {
    setStatus(p => ({...p, [key]: 'loading'}));
    try {
      const data = await file.arrayBuffer();
      const wb = window.XLSX.read(data, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:'', blankrows:false});

      // ── Name match analysis ───────────────────────────────────────────────
      // Find which column looks like expert names (header contains "expert", "doctor", "name")
      const headers = rows[0] || [];
      const nameColIdx = headers.findIndex(h =>
        String(h).toLowerCase().includes('expert') ||
        String(h).toLowerCase().includes('doctor') ||
        String(h).toLowerCase().includes('name') ||
        String(h).toLowerCase().includes('medical')
      );
      if (nameColIdx >= 0 && key === 'util') {
        const dataRows = rows.slice(1).filter(r => r[nameColIdx] && String(r[nameColIdx]).trim());
        const matched = [], unmatched = [];
        dataRows.forEach(row => {
          const uploadedName = String(row[nameColIdx]).trim();
          if (uploadedName.toLowerCase() === 'total' || uploadedName.toLowerCase() === 'grand total') return;
          const match = findMatch(uploadedName);
          if (match) {
            matched.push({uploaded: uploadedName, expert: match.expert, type: match.type});
          } else {
            unmatched.push(uploadedName);
          }
        });
        setMatchReport({key, matched, unmatched, headers, nameColIdx, totalRows: dataRows.length});
      }

      // Save to Supabase if available
      if (sbReady) {
        await sbSet('am_report_data', key, {rows: rows.slice(0,500), filename: file.name, ts: new Date().toISOString()});
        await sbSet('am_report_data', key+'_meta', {filename: file.name, rows: rows.length, ts: new Date().toISOString()});
      }
      setLastUploaded(p => ({...p, [key]: {filename: file.name, rows: rows.length, ts: new Date().toLocaleTimeString('en-AU')}}));
      setStatus(p => ({...p, [key]: 'ok'}));
      showToast('✓ ' + file.name + ' uploaded (' + rows.length + ' rows)');
    } catch(e) {
      setStatus(p => ({...p, [key]: 'error'}));
      showToast('✗ Upload failed: ' + e.message, 'err');
    }
  }, [showToast, expertNames]);

  const requiredCount = REPORT_MANIFEST.filter(r=>r.required).length;
  const uploadedRequired = REPORT_MANIFEST.filter(r=>r.required && status[r.key]==='ok').length;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:200,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:40,overflowY:'auto'}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:740,margin:'0 20px 40px',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:'#0f172a',padding:'18px 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:16}}>▲ Upload Reports</div>
            <div style={{color:'#64748b',fontSize:11,marginTop:2}}>Keep performance data current — upload weekly on Mondays after Zoho exports</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontSize:11,color:uploadedRequired===requiredCount?'#22c55e':'#f59e0b',fontWeight:600}}>
              {uploadedRequired}/{requiredCount} required uploaded this session
            </div>
            <button onClick={onClose} style={{background:'#1e293b',border:'none',color:'#94a3b8',cursor:'pointer',padding:'6px 10px',borderRadius:6,fontSize:13}}>✕ Close</button>
          </div>
        </div>

        {/* Required section */}
        <div style={{padding:'20px 24px 0'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#dc2626',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#dc2626',display:'inline-block'}}/>
            Required weekly uploads
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:10,marginBottom:20}}>
            {REPORT_MANIFEST.filter(r=>r.required).map(r => (
              <UploadCard key={r.key} report={r} status={status[r.key]} lastUploaded={lastUploaded[r.key]} onFile={handleFile}/>
            ))}
          </div>

          <div style={{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#9ca3af',display:'inline-block'}}/>
            Optional uploads
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:10,marginBottom:24}}>
            {REPORT_MANIFEST.filter(r=>!r.required).map(r => (
              <UploadCard key={r.key} report={r} status={status[r.key]} lastUploaded={lastUploaded[r.key]} onFile={handleFile}/>
            ))}
          </div>
        </div>

        {/* Name Match Report */}
        {matchReport && (
          <div style={{margin:'0 24px 24px',border:'1px solid #e5e7eb',borderRadius:10,overflow:'hidden'}}>
            <div style={{background:'#0f172a',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}}
              onClick={()=>setShowMatchReport(p=>!p)}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{color:'#fff',fontWeight:600,fontSize:13}}>🔍 Name match report — Utilisation upload</span>
                <span style={{padding:'1px 8px',borderRadius:10,background:matchReport.unmatched.length===0?'#16a34a':'#ef4444',color:'#fff',fontSize:11,fontWeight:700}}>
                  {matchReport.unmatched.length === 0
                    ? `✓ All ${matchReport.matched.length} matched`
                    : `⚠ ${matchReport.unmatched.length} unmatched`}
                </span>
                {matchReport.matched.filter(m=>m.type==='partial').length > 0 && (
                  <span style={{padding:'1px 8px',borderRadius:10,background:'#f59e0b',color:'#fff',fontSize:11,fontWeight:700}}>
                    {matchReport.matched.filter(m=>m.type==='partial').length} fuzzy
                  </span>
                )}
              </div>
              <span style={{color:'#64748b',fontSize:12}}>{showMatchReport ? '▲ Hide' : '▼ Show'}</span>
            </div>

            {showMatchReport && (
              <div style={{maxHeight:360,overflowY:'auto'}}>
                {matchReport.unmatched.length > 0 && (
                  <div style={{padding:'12px 16px',background:'#fef2f2',borderBottom:'1px solid #fecaca'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#dc2626',marginBottom:6}}>
                      ✗ {matchReport.unmatched.length} names NOT matched — these rows will NOT update utilisation
                    </div>
                    <div style={{fontSize:11,color:'#9ca3af',marginBottom:8}}>Check spelling or add the expert to the app roster</div>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {matchReport.unmatched.map((name,i) => (
                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 8px',background:'#fff',borderRadius:5,border:'1px solid #fecaca'}}>
                          <span style={{color:'#dc2626',fontSize:12,fontWeight:700}}>✗</span>
                          <span style={{fontSize:12,color:'#374151',fontFamily:'monospace'}}>{name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {matchReport.matched.filter(m=>m.type==='partial').length > 0 && (
                  <div style={{padding:'12px 16px',background:'#fffbeb',borderBottom:'1px solid #fde68a'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#d97706',marginBottom:6}}>
                      ~ {matchReport.matched.filter(m=>m.type==='partial').length} fuzzy matches — verify these are correct
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {matchReport.matched.filter(m=>m.type==='partial').map((m,i) => (
                        <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px',background:'#fff',borderRadius:5,border:'1px solid #fde68a'}}>
                          <span style={{fontSize:12,color:'#d97706',fontWeight:700}}>~</span>
                          <span style={{fontSize:12,color:'#374151',fontFamily:'monospace',flex:1}}>{m.uploaded}</span>
                          <span style={{fontSize:11,color:'#9ca3af'}}>matched to</span>
                          <span style={{fontSize:12,color:'#92400e',fontFamily:'monospace',fontWeight:600}}>{m.expert}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {matchReport.matched.filter(m=>m.type==='exact').length > 0 && (
                  <div style={{padding:'12px 16px'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#15803d',marginBottom:8}}>
                      ✓ {matchReport.matched.filter(m=>m.type==='exact').length} exact matches
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {matchReport.matched.filter(m=>m.type==='exact').map((m,i) => (
                        <span key={i} style={{fontSize:11,padding:'2px 8px',background:'#f0fdf4',color:'#15803d',borderRadius:10,border:'1px solid #bbf7d0'}}>{m.expert}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

function UploadCard({report, status, lastUploaded, onFile}) {
  const [drag, setDrag] = useState(false);
  const isOk      = status === 'ok';
  const isLoading = status === 'loading';
  const isError   = status === 'error';
  const borderCol = isOk?'#16a34a':isError?'#dc2626':drag?'#0066CC':'#e5e7eb';
  const bgCol     = isOk?'#f0fdf4':isError?'#fef2f2':drag?'#f0f7ff':'#fafafa';
  return (
    <div
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)onFile(f,report.key);}}
      style={{border:`1.5px dashed ${borderCol}`,borderRadius:10,padding:'12px',background:bgCol,transition:'all .15s',position:'relative'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:20}}>{report.icon}</span>
        {isOk     && <span style={{fontSize:11,color:'#16a34a',fontWeight:700}}>✓ Uploaded</span>}
        {isError  && <span style={{fontSize:11,color:'#dc2626',fontWeight:700}}>✗ Error</span>}
        {isLoading && <span style={{fontSize:11,color:'#6b7280'}}>Parsing…</span>}
      </div>
      <div style={{fontSize:12,fontWeight:700,color:'#0f172a',marginBottom:3}}>{report.label}</div>
      <div style={{fontSize:9,color:'#9ca3af',fontFamily:'monospace',marginBottom:5,wordBreak:'break-all'}}>{report.filename}</div>
      <div style={{fontSize:10,color:'#6b7280',lineHeight:1.4,marginBottom:8}}>{report.updates}</div>
      <div style={{fontSize:9,color:'#94a3b8',lineHeight:1.3,marginBottom:8,padding:'5px 7px',background:'#f8fafc',borderRadius:5,border:'1px solid #f1f5f9'}}>
        <span style={{fontWeight:600,color:'#64748b'}}>Export from: </span>{report.source}
      </div>
      {lastUploaded && (
        <div style={{fontSize:10,color:'#16a34a',marginBottom:6}}>
          ✓ {lastUploaded.filename} ({lastUploaded.rows} rows) at {lastUploaded.ts}
        </div>
      )}
      <label style={{display:'block',textAlign:'center',padding:'6px',background:isOk?'#dcfce7':'#0066CC',color:isOk?'#15803d':'#fff',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:isOk?'1px solid #86efac':'none'}}>
        {isOk?'Replace file':'Choose file'}
        <input type="file" accept=".xlsx,.csv" onChange={e=>{const f=e.target.files[0];if(f)onFile(f,report.key);e.target.value='';}} style={{display:'none'}}/>
      </label>
    </div>
  );
}

// ── Loading skeleton ──────────────────────────────────────────────────────────
function LoadingSkeleton() {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {[...Array(8)].map((_,i)=>(
        <div key={i} style={{background:'#fff',borderRadius:9,padding:'14px',border:'1px solid #f3f4f6',opacity:1-i*0.08}}>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:'#f3f4f6'}}/>
            <div style={{flex:1}}>
              <div style={{height:12,background:'#f3f4f6',borderRadius:4,width:'55%',marginBottom:6}}/>
              <div style={{height:10,background:'#f9fafb',borderRadius:4,width:'35%'}}/>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
