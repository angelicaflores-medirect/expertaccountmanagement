function getTier(name) {
  return ZOHO_TIERS[name] || null;
}

function initials(name) {
  const parts = name.replace(/\(.*?\)/g,'').replace(/\b(AM|OAM|AO)\b/g,'').trim().split(/\s+/);
  return ((parts[0]||'')[0] + (parts[parts.length-1]||'')[0]).toUpperCase();
}
function relDate(ts) {
  if (!ts) return null;
  const d = Date.now() - new Date(ts).getTime();
  const days = Math.floor(d / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7) return `${days}d ago`;
  if (days < 30) return `${Math.floor(days/7)}w ago`;
  return `${Math.floor(days/30)}mo ago`;
}
function fmtTs(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});
}
function daysSince(ts) {
  if (!ts) return 999;
  return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
}

// 1. Quarterly review cadence by tier
function getReviewCadenceDays(tier) {
  if (tier === 'A' || tier === 'High Potential') return 30;
  if (tier === 'B') return 42;
  if (tier === 'C') return 60;
  return 90;
}
function daysUntilReviewDue(expert, commsData, baselineData) {
  baselineData = baselineData || {};
  const logs = commsData[expert.name]?.logs || [];
  const tier = getTier(expert.name);
  const cadence = getReviewCadenceDays(tier);
  // Use tool logs first, fall back to baseline
  const lastReview = logs.find(l => ['call','meeting','email'].includes(l.type));
  const toolTs = lastReview?.ts || null;
  const baselineTs = baselineData[expert.name] ? new Date(baselineData[expert.name]).getTime() : null;
  const effectiveTs = toolTs && baselineTs ? Math.max(toolTs, baselineTs) : toolTs || baselineTs;
  const dsc = effectiveTs ? daysSince(effectiveTs) : 9999;
  return cadence - dsc;
}

// 2. Revenue trend alert
function getRevenueTrend(name) {
  const rev = REV_DATA[name];
  if (!rev || !rev.prev || rev.prev === 0) return null;
  return { cur: rev.cur, prev: rev.prev, yoy: rev.yoy, alert: rev.yoy <= -20 };
}

// 3. Availability gap
function getAvailabilityGap(name) {
  const util = UTIL_DATA[name];
  if (!util || util.total < 5) return null;
  const gap = 100 - util.pct;
  return { pct: util.pct, total: util.total, booked: util.booked, gap, alert: util.pct < 30 };
}

// 4. Work anniversary (within 7 days)
function getAnniversary(commsData, name) {
  const recruited = commsData[name]?.recruited_date;
  if (!recruited) return null;
  const recruitedDate = new Date(recruited);
  const now = nowAEST();
  const yearsDiff = now.getFullYear() - recruitedDate.getFullYear();
  if (yearsDiff < 1) return null;
  const thisYearAnniv = new Date(now.getFullYear(), recruitedDate.getMonth(), recruitedDate.getDate());
  const daysTo = Math.ceil((thisYearAnniv - now) / 86400000);
  if (daysTo >= -3 && daysTo <= 14) return { years: yearsDiff, daysTo };
  return null;
}

// 5. Scheme gaps — accredited but low volume (uses top scheme from stats)
function getSchemeGaps(name) {
  const stats = EXP_STATS[name];
  const rev = REV_DATA[name];
  if (!stats || !rev) return null;
  // Low volume despite having data
  if (stats.cases < 10 && rev.cur > 0) return { cases: stats.cases, scheme: stats.scheme };
  return null;
}

// 7. Onboarding velocity
function getOnboardingVelocity(commsData, name) {
  const comms = commsData[name] || {};
  const recruited = comms.recruited_date;
  if (!recruited) return null;
  const daysSinceRecruited = daysSince(new Date(recruited).getTime());
  const stats = EXP_STATS[name];
  const hasBooking = stats && stats.cases > 0;
  const target = 45;
  if (hasBooking) return { status: 'achieved', days: daysSinceRecruited };
  if (daysSinceRecruited > target) return { status: 'overdue', days: daysSinceRecruited, target };
  if (daysSinceRecruited > target * 0.7) return { status: 'at_risk', days: daysSinceRecruited, target };
  return { status: 'on_track', days: daysSinceRecruited, target };
}

// 8. Sentiment summary from logs
function getRecentSentiment(commsData, name) {
  const logs = (commsData[name]?.logs || []).slice(0, 10);
  const pos = logs.filter(l => l.sentiment === 'positive').length;
  const neg = logs.filter(l => l.sentiment === 'negative').length;
  if (pos === 0 && neg === 0) return null;
  return { positive: pos, negative: neg, neutral: logs.length - pos - neg };
}

// 12. Exit risk score
function getExitRisk(expert, commsData) {
  let risk = 0;
  const reasons = [];
  const rev = REV_DATA[expert.name];
  const util = UTIL_DATA[expert.name];
  const logs = commsData[expert.name]?.logs || [];
  const dsc = daysSince(logs[0]?.ts);
  const tier = getTier(expert.name);
  const tags = commsData[expert.name]?.tags || [];
  const hasIssues = tags.some(t => ['needs_attention','report_quality','report_tat','availability','comms'].includes(t));

  if (dsc > 60)  { risk += 30; reasons.push('No contact 60+ days'); }
  else if (dsc > 30) { risk += 15; reasons.push('No contact 30+ days'); }
  if (rev && rev.prev > 0 && rev.yoy <= -30) { risk += 25; reasons.push(`Revenue -${Math.abs(rev.yoy)}% YoY`); }
  if (util && util.total >= 5 && util.pct < 20) { risk += 20; reasons.push('Very low utilisation'); }
  if (hasIssues) { risk += 15; reasons.push('Active issue flags'); }
  if (logs.length < 2) { risk += 10; reasons.push('Minimal engagement history'); }
  if (tier === 'A' || tier === 'High Potential') risk = Math.round(risk * 1.3);

  return { score: Math.min(risk, 100), level: risk >= 50 ? 'high' : risk >= 25 ? 'medium' : 'low', reasons };
}

// ── Effective last contact (tool logs OR Zoho baseline, whichever is more recent) ──
function getEffectiveLastContact(expertName, commsData, baselineData) {
  const logs = commsData[expertName]?.logs || [];
  const toolTs = logs.length ? logs[0].ts : null;
  const baselineIso = baselineData[expertName] || baselineData[expertName.toLowerCase()];
  const baselineTs = baselineIso ? new Date(baselineIso).getTime() : null;
  // Return most recent of tool logs vs baseline
  if (toolTs && baselineTs) return Math.max(toolTs, baselineTs);
  return toolTs || baselineTs || null;
}

// ── Scoring system ───────────────────────────────────────────────────────────
// attentionScore: 0-100+ — reasons this expert needs action now
// healthScore:    0-100  — relationship quality indicator
// engagementBand: 'strong' | 'regular' | 'low' | 'cold' | 'none'

function scoreExpert(expert, commsData, baselineData) {
  baselineData = baselineData || {};
  const comms = commsData[expert.name] || {logs:[], notes:'', training:{}};
  const logs  = comms.logs || [];
  const tier  = getTier(expert.name);
  const util  = UTIL_DATA[expert.name];
  const stats = EXP_STATS[expert.name];
  const rev   = REV_DATA[expert.name];

  const effectiveLastContact = getEffectiveLastContact(expert.name, commsData, baselineData);
  const lastContact     = effectiveLastContact;
  const dsc             = daysSince(lastContact);             // days since contact
  const isActive        = ['Recruited','Casual'].includes(expert.status);
  const isNewRecruit    = !['Recruited','Casual','Sabbatical'].includes(expert.status);
  const tierWeight      = tier === 'A' || tier === 'High Potential' ? 1.5 : tier === 'B' ? 1.2 : 1.0;
  const trainingDone    = Object.values(comms.training||{}).filter(Boolean).length;
  const trainingPct     = trainingDone / TRAINING_ITEMS.length;
  const hasTags         = (comms.tags||[]).length > 0;
  const hasIssueFlag    = (comms.tags||[]).some(t => ['needs_attention','report_quality','report_tat','availability'].includes(t));
  const hasIssueLogs    = logs.some(l => l.type === 'issue');
  const pendingTasks    = logs.filter(l => l.type === 'task' && !l.taskDone).length;
  const logsLast30      = logs.filter(l => l.ts && daysSince(l.ts) <= 30).length;
  const logsLast90      = logs.filter(l => l.ts && daysSince(l.ts) <= 90).length;
  const daysSinceInv    = stats && stats.last ? daysSince(new Date(stats.last).getTime()) : null;

  // ── Attention score (reasons to act) ──────────────────────────────────────
  let attention = 0;
  const reasons = [];

  // Overdue contact — weighted by tier
  if (!lastContact) {
    attention += Math.round(50 * tierWeight);
    reasons.push({label: 'Never contacted', severity: 'high'});
  } else if (dsc > 30) {
    attention += Math.round(45 * tierWeight);
    reasons.push({label: `No contact ${dsc}d`, severity: 'high'});
  } else if (dsc > 21) {
    attention += Math.round(30 * tierWeight);
    reasons.push({label: `No contact ${dsc}d`, severity: 'med'});
  } else if (dsc > 14) {
    attention += Math.round(15 * tierWeight);
    reasons.push({label: `No contact ${dsc}d`, severity: 'low'});
  }

  // New recruit / in-progress not yet training complete
  if (isNewRecruit) {
    attention += 25;
    reasons.push({label: 'Onboarding active', severity: 'med'});
    if (trainingPct < 0.5) {
      attention += 15;
      reasons.push({label: 'Training <50%', severity: 'med'});
    }
  }

  // Issue flags
  if (hasIssueLogs || hasIssueFlag) {
    attention += 20;
    reasons.push({label: 'Issue flagged', severity: 'high'});
  }

  // Pending tasks
  if (pendingTasks > 0) {
    attention += 10 * Math.min(pendingTasks, 3);
    reasons.push({label: `${pendingTasks} pending task${pendingTasks>1?'s':''}`, severity: 'med'});
  }

  // Review cadence overdue
  const cadence = getReviewCadenceDays(tier);
  const lastReview = logs.find(l => ['call','meeting','email'].includes(l.type));
  const daysSinceReview = lastReview ? daysSince(lastReview.ts) : 9999;
  if (isActive && daysSinceReview > cadence) {
    const overdueDays = daysSinceReview - cadence;
    const reviewPoints = Math.round(Math.min(overdueDays * 1.5, 30) * tierWeight);
    attention += reviewPoints;
    reasons.push({label: `Review ${overdueDays}d overdue (${cadence}d cadence)`, severity: overdueDays > 14 ? 'high' : 'med'});
  }

  // High-tier expert with low engagement
  if (isActive && (tier === 'A' || tier === 'High Potential')) {
    if (logsLast30 === 0) {
      attention += 20;
      reasons.push({label: 'Tier A — no contact this month', severity: 'high'});
    }
    if (daysSinceInv !== null && daysSinceInv > 45) {
      attention += 20;
      reasons.push({label: `No invoice ${daysSinceInv}d`, severity: 'high'});
    }
  } else if (isActive && tier === 'B') {
    if (daysSinceInv !== null && daysSinceInv > 60) {
      attention += 15;
      reasons.push({label: `No invoice ${daysSinceInv}d`, severity: 'med'});
    }
  }

  // Revenue decline
  if (rev && rev.prev > 0 && rev.yoy <= -25) {
    attention += 15;
    reasons.push({label: `Revenue ${rev.yoy}% YoY`, severity: 'high'});
  }

  // ── Health score (0–100, higher = healthier relationship) ─────────────────
  let health = 50; // baseline

  // Recent contact cadence
  if      (dsc <= 7)  health += 25;
  else if (dsc <= 14) health += 15;
  else if (dsc <= 30) health += 5;
  else if (dsc <= 60) health -= 10;
  else                health -= 25;

  // Interaction volume — consistent engagement
  if      (logsLast30 >= 4) health += 15;
  else if (logsLast30 >= 2) health += 8;
  else if (logsLast30 === 0 && logsLast90 === 0) health -= 15;

  // Mix of interaction types (calls + emails + meetings = varied = healthy)
  const interactionTypes = new Set(logs.slice(0,20).map(l=>l.type)).size;
  if (interactionTypes >= 3) health += 5;

  // Training completion (for active onboarding)
  if (isNewRecruit) {
    health += Math.round((trainingPct - 0.5) * 20);
  }

  // Issue flags drag health
  if (hasIssueLogs || hasIssueFlag) health -= 20;
  if (pendingTasks > 0)             health -= 5 * pendingTasks;

  // Revenue growth = good sign
  if (rev && rev.prev > 0 && rev.yoy >= 10) health += 10;
  else if (rev && rev.prev > 0 && rev.yoy <= -25) health -= 10;

  health = Math.max(0, Math.min(100, health));

  // ── Engagement band ───────────────────────────────────────────────────────
  let band;
  if      (!lastContact)         band = 'none';
  else if (dsc <= 7  && logsLast30 >= 3) band = 'strong';
  else if (dsc <= 14 && logsLast30 >= 2) band = 'regular';
  else if (dsc <= 30)            band = 'low';
  else                           band = 'cold';

  return {attention: Math.round(attention), health, band, reasons};
}

// ── Weekly export ─────────────────────────────────────────────────────────────
function exportAllComms(commsData, expertSource) {
  const rows = [];
  rows.push(['Expert','Specialty','AM','Status','Tier','Date','Type','Logged By','Notes','Tags','Task Done','Onboarding %','Training %','Recruited Date']);
  expertSource.forEach(expert => {
    const comms = commsData[expert.name] || {logs:[], notes:'', training:{}, onboarding:{}};
    const logs = comms.logs || [];
    const tier = ZOHO_TIERS[expert.name] || '';
    const trainingPct = Math.round(Object.values(comms.training||{}).filter(Boolean).length / TRAINING_ITEMS.length * 100);
    const onboardingPct = Math.round(ONBOARDING_ACTIONS.filter(a => comms.onboarding && comms.onboarding[a.id] && comms.onboarding[a.id].done).length / ONBOARDING_ACTIONS.length * 100);
    if (logs.length === 0) {
      rows.push([expert.name, expert.spec, expert.am, expert.status, tier, '', '', '', comms.notes||'', (comms.tags||[]).join('; '), '', onboardingPct+'%', trainingPct+'%', comms.recruited_date ? new Date(comms.recruited_date).toLocaleDateString('en-AU') : '']);
    } else {
      logs.forEach((log, i) => {
        rows.push([
          i===0 ? expert.name : '',
          i===0 ? expert.spec : '',
          i===0 ? expert.am : '',
          i===0 ? expert.status : '',
          i===0 ? tier : '',
          log.ts ? new Date(log.ts).toLocaleDateString('en-AU') : '',
          log.type || '',
          log.by || '',
          log.note || '',
          i===0 ? (comms.tags||[]).join('; ') : '',
          log.taskDone ? 'Yes' : (log.type==='task' ? 'Pending' : ''),
          i===0 ? onboardingPct+'%' : '',
          i===0 ? trainingPct+'%' : '',
          i===0 && comms.recruited_date ? new Date(comms.recruited_date).toLocaleDateString('en-AU') : '',
        ]);
      });
    }
  });
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'MEDirect_AM_Export_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

      const {error} = await _sb.from('am_app_data').upsert(payload, {onConflict:'key'});
      if (error) throw new Error(error.message);
      const meta = {ts: new Date().toISOString(), count: EXPERTS_RAW.length, by: 'manual sync'};
      await sbSetSyncMeta(meta);
      setSyncMeta(meta);
      showToast('✓ Performance data synced — notes & interactions untouched');
    } catch(e) {
      showToast('✗ Sync error: ' + e.message, 'err');
    } finally {
      setSyncing(false);
    }
  }, [showToast]);

  // Sync support staff from Zoho CRM via Anthropic API (run from Claude.ai session)
  const syncSupportStaff = useCallback(async () => {
    if (!sbReady) { showToast('⚠ Supabase not connected', 'err'); return; }
    if (!window.MEDIRECT_ANTHROPIC_KEY) { showToast('⚠ Add your Anthropic API key to MEDIRECT_ANTHROPIC_KEY in the HTML to use this feature', 'err'); return; }
    setSyncingStaff(true);
    showToast('🔄 Fetching support staff from Zoho CRM…');
    try {
      // Use Anthropic API with Zoho MCP to fetch all experts with support staff
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': window.MEDIRECT_ANTHROPIC_KEY || '',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 8000,
          system: `You fetch Medical Expert support staff from Zoho CRM.
Use the Zoho CRM MCP to:
1. Get all Medical_Experts records that have Support_Staff subform entries
2. For each expert with support staff, extract: expert id, expert Name, and for each staff member: id, First_Name, Name1 (last name), Role, Email, Phone, Notes
Return ONLY a JSON array of objects with these exact keys:
expert_name, zoho_expert_id, staff_id, first_name, last_name, role, email, phone, notes
No other text. No markdown. Just the JSON array.
Fetch as many experts as possible — use pagination. Focus on recruited/active experts.`,
          messages: [{role: 'user', content: 'Fetch all Medical Experts from Zoho CRM that have Support_Staff entries. Use the getRecords endpoint with fields=id,Name,Support_Staff. You may need multiple pages. Return the JSON array as instructed.'}],
          mcp_servers: [{type: 'url', url: 'https://claude-zohocrm.zohomcp.com.au/mcp/message', name: 'zoho-crm'}]
        })
      });
      const data = await resp.json();
      const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      const match = text.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('No JSON array in response');
      const rows = JSON.parse(match[0]);
      if (!rows.length) throw new Error('No support staff returned');

      // Upsert into Supabase in batches of 50
      const batchSize = 50;
      let total = 0;
      for (let i = 0; i < rows.length; i += batchSize) {
        const batch = rows.slice(i, i + batchSize).map(r => ({...r, synced_at: new Date().toISOString()}));
        const {error} = await _sb
          .from('expert_support_staff')
          .upsert(batch, {onConflict: 'zoho_expert_id,staff_id'});
        if (error) throw new Error(error.message);
        total += batch.length;
      }
      // Update sync meta
      await _sb.from('expert_support_staff_meta')
        .upsert({key: 'last_sync', value: new Date().toISOString()}, {onConflict: 'key'});
      showToast(`✓ Synced ${total} support staff records to Supabase`);
    } catch(e) {
      showToast('✗ Support staff sync failed: ' + e.message, 'err');
    } finally {
      setSyncingStaff(false);
    }
  }, [showToast, sbReady]);

  // Sync last 5 CRM notes per expert from Zoho → Supabase
  const syncCRMNotes = useCallback(async () => {
    if (!sbReady) { showToast('⚠ Supabase not connected', 'err'); return; }
    if (!window.MEDIRECT_ANTHROPIC_KEY) { showToast('⚠ Add your Anthropic API key to MEDIRECT_ANTHROPIC_KEY in the HTML to use this feature', 'err'); return; }
    setSyncingNotes(true);
    showToast('🔄 Fetching CRM notes from Zoho — this may take a minute…');
    try {
      // Build list of experts with known Zoho IDs
      const idMap = window._ZOHO_ID_MAP || {};
      const entries = Object.entries(idMap).slice(0, 200); // cap to avoid timeout
      if (!entries.length) throw new Error('No Zoho ID map available');

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': window.MEDIRECT_ANTHROPIC_KEY || '',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 16000,
          system: `You fetch recent Zoho CRM notes for a list of Medical Expert records.
For each expert in the provided list, use getRelatedRecords on the Medical_Experts module with:
- relatedList: Notes
- fields: id,Note_Title,Note_Content,Created_Time,Created_By
- sort_by: Modified_Time, sort_order: desc, perPage: 5

Return ONLY a JSON array. Each element:
{"expert_name":"...", "zoho_id":"...", "notes":[{"id":"...","title":"...","content":"...","date":"YYYY-MM-DD","author":"Name"}]}
Strip HTML from content. Truncate content to 400 chars. Skip experts with zero notes.
No other text. No markdown.`,
          messages: [{role: 'user', content: `Fetch last 5 notes for these experts:\n${entries.map(([name, id]) => `${name}: ${id}`).join('\n')}\n\nReturn JSON array only.`}],
          mcp_servers: [{type: 'url', url: 'https://claude-zohocrm.zohomcp.com.au/mcp/message', name: 'zoho-crm'}]
        })
      });
      const data = await resp.json();
      const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      const match = text.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('No JSON returned from API');
      const results = JSON.parse(match[0]);
      if (!results.length) throw new Error('No notes returned');

      // Upsert into Supabase
      const syncedAt = new Date().toISOString();
      const batch = results.map(r => ({
        expert_name: r.expert_name,
        zoho_id: r.zoho_id,
        notes_json: JSON.stringify(r.notes || []),
        synced_at: syncedAt,
      }));
      const {error} = await _sb.from('expert_crm_notes').upsert(batch, {onConflict: 'expert_name'});
      if (error) throw new Error(error.message);

      // Update local state
      const notesMap = {};
      results.forEach(r => { notesMap[r.expert_name] = {notes: r.notes || [], synced_at: syncedAt}; });
      setCrmNotesData(prev => ({...prev, ...notesMap}));
      showToast(`✓ Synced CRM notes for ${results.length} experts`);
    } catch(e) {
      showToast('✗ CRM notes sync failed: ' + e.message, 'err');
    } finally {
      setSyncingNotes(false);
    }
  }, [showToast, sbReady]);

  // Set recruited_date if not already set
  const flagNewRecruit = useCallback(async (name) => {
    const now = new Date().toISOString();
    const existing = commsData[name] || {logs:[], notes:'', training:{}};
    if (existing.recruited_date) return; // already flagged
    const updated = {...existing, recruited_date: now, flaggedNew: true};
    setCommsData(prev => ({...prev, [name]: updated}));
    await sbSet('expert_am_comms', name, updated);
    // Log an auto-entry
    const entry = {type:'note', note:'🆕 Expert flagged as new recruit — 90-day onboarding started', ts: Date.now(), by:'system', id: Date.now()};
    const withLog = {...updated, logs: [entry, ...(updated.logs||[])]};
    setCommsData(prev => ({...prev, [name]: withLog}));
    await sbSet('expert_am_comms', name, withLog);
    showToast('✓ ' + name + ' flagged as new recruit');
  }, [commsData, showToast]);

  // Expert source — EXPERTS_RAW is populated from Supabase (or seed) at startup
  const expertSource = useMemo(()=>{
    return EXPERTS_RAW.map(function(r){ return {name:r[0],spec:r[1],am:r[2],status:r[3],tier:ZOHO_TIERS[r[0]]||null}; });
  },[loading]);  // re-derive after loading completes

  // Filtered + sorted expert list
  const filteredExperts = useMemo(()=>{
    let list = expertSource.map(e=>({...e}));
    // Apply all filters first
    if (activeAM !== 'All') list = list.filter(e => e.am === activeAM);
    if (filterSt !== 'All') list = list.filter(e => e.status === filterSt);
    if (filterSpec !== 'All') list = list.filter(e => e.spec === filterSpec);
    if (filterTier === 'none') list = list.filter(e => !getTier(e.name));
    else if (filterTier !== 'All') list = list.filter(e => getTier(e.name) === filterTier);
    if (filterPri)  list = list.filter(e => scoreExpert(e, commsData, baselineData).attention >= 25);
    if (filterBand !== 'All') list = list.filter(e => scoreExpert(e, commsData, baselineData).band === filterBand);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(e => e.name.toLowerCase().includes(q) || e.spec.toLowerCase().includes(q));
    }
    // Sort — overdue follow-ups → review overdue → attention → exit risk → last activity
    function earliestFollowUp(name) {
      const logs = commsData[name]?.logs || [];
      const upcoming = logs
        .filter(l => l.followUp && !l.followUpDone)
        .map(l => new Date(l.followUp).getTime())
        .sort((a,b) => a-b);
      return upcoming.length ? upcoming[0] : null;
    }
    const nowTs = Date.now();
    list.sort((a,b) => {
      const fa = earliestFollowUp(a.name);
      const fb = earliestFollowUp(b.name);
      const aOverdue = fa && fa < nowTs;
      const bOverdue = fb && fb < nowTs;
      // Overdue follow-ups float to top
      if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
      // Both overdue: most overdue first
      if (aOverdue && bOverdue) return fa - fb;
      // Upcoming follow-ups (within 7 days) next
      const aSoon = fa && fa > nowTs && (fa - nowTs) < 7*86400000;
      const bSoon = fb && fb > nowTs && (fb - nowTs) < 7*86400000;
      if (aSoon !== bSoon) return aSoon ? -1 : 1;
      if (aSoon && bSoon) return fa - fb;
      // Then by attention score (includes review overdue via scoring)
      const pa = scoreExpert(a, commsData, baselineData).attention;
      const pb = scoreExpert(b, commsData, baselineData).attention;
      if (pa !== pb) return pb - pa;
      // Then exit risk
      const ra = getExitRisk(a, commsData).score;
      const rb = getExitRisk(b, commsData).score;
      if (ra !== rb) return rb - ra;
      // Then last activity
      const la = (commsData[a.name]?.logs||[])[0]?.ts || 0;
      const lb = (commsData[b.name]?.logs||[])[0]?.ts || 0;
      if (la !== lb) return lb - la;
      return a.name.localeCompare(b.name);
    });
    return list;
  },[activeAM, filterSt, filterSpec, filterTier, filterPri, filterBand, search, commsData, expertSource, baselineData]);

  // Stats per AM
  const amStats = useMemo(()=>{
    const stats = {};
    ALL_AMS.forEach(am => {
      const experts = EXPERTS_RAW.filter(([,,,]) => true).map(([n,s,a,st])=>({name:n,spec:s,am:a,status:st})).filter(e=>e.am===am);
      const needsContact = experts.filter(e => daysSince((commsData[e.name]?.logs||[])[0]?.ts) > 14).length;
      const newRecruits = experts.filter(e => e.status !== 'Recruited').length;
      const tierA = experts.filter(e => getTier(e.name) === 'A' || getTier(e.name) === 'High Potential').length;
      stats[am] = {total: experts.length, needsContact, newRecruits, tierA};
    });
    return stats;
  },[commsData]);

  return (
    <div style={{minHeight:'100vh', background:'#F0F2F7', fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {/* Setup banner — shown when Supabase not configured */}
      {!sbReady && !loading && (
        <div style={{background:'#78350f',padding:'8px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <span style={{fontSize:12,color:'#fef3c7',fontWeight:500}}>
            ⚠ Supabase not configured — performance data loads from seed, but notes and interactions will only persist within this browser session. Add <code style={{background:'#92400e',padding:'1px 6px',borderRadius:3}}>medirect-cloud-config.js</code> to enable permanent storage.
          </span>
          <button onClick={syncFromZoho} disabled={syncing}
            style={{padding:'5px 12px',background:'#f59e0b',color:'#1c1917',border:'none',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
            Push to Supabase
          </button>
        </div>
      )}

      {/* Top bar */}
      <TopBar activeAM={activeAM} setActiveAM={setActiveAM} amStats={amStats} sbReady={sbReady} onSync={syncFromZoho} syncing={syncing} syncMeta={syncMeta} onUpload={()=>setShowUpload(true)} onExport={()=>exportAllComms(commsData, expertSource)} onSyncStaff={syncSupportStaff} syncingStaff={syncingStaff} onSyncNotes={syncCRMNotes} syncingNotes={syncingNotes} onDashboard={()=>setShowDashboard(p=>!p)} showDashboard={showDashboard} />

      {/* Body */}
      <div style={{maxWidth:1320, margin:'0 auto', padding:'20px 20px', display:'grid', gridTemplateColumns: selected ? '380px 1fr' : '1fr', gap:16, alignItems:'start'}}>

        {/* Left: expert list */}
        <div>
          <ListControls search={search} setSearch={setSearch} filterSt={filterSt} setFilterSt={setFilterSt} filterTier={filterTier} setFilterTier={setFilterTier} filterSpec={filterSpec} setFilterSpec={setFilterSpec} filterPri={filterPri} setFilterPri={setFilterPri} filterBand={filterBand} setFilterBand={setFilterBand} count={filteredExperts.length}/>
          {loading
            ? <LoadingSkeleton/>
            : <ExpertList experts={filteredExperts} commsData={commsData} selected={selected} onSelect={setSelected} activeAM={activeAM} baselineData={baselineData}/>
          }
        </div>

        {/* Right: detail panel */}
        {selected && (
          <ExpertPanel
            key={selected.name}
            expert={selected}
            comms={commsData[selected.name] || {logs:[], notes:'', training:{}}}
            onSave={rec => saveComms(selected.name, rec)}
            onClose={()=>setSelected(null)}
            showToast={showToast}
            onFlagNew={()=>flagNewRecruit(selected.name)}
            zohoContacts={zohoContacts[selected.name]}
            baselineData={baselineData}
            crmNotes={crmNotesData[selected.name] || null}
          />
        )}
      </div>

      {/* Upload modal */}
      {showDashboard && (
        <AMWorkloadDashboard
          experts={expertSource}
          commsData={commsData}
          baselineData={baselineData}
          onClose={()=>setShowDashboard(false)}
        />
      )}
      {showUpload && <UploadModal onClose={()=>setShowUpload(false)} showToast={showToast}/>}

      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:toast.type==='ok'?'#0f172a':'#dc2626',color:'#fff',padding:'10px 20px',borderRadius:8,fontSize:13,fontWeight:600,boxShadow:'0 4px 16px rgba(0,0,0,.2)',zIndex:999}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ── Top bar ───────────────────────────────────────────────────────────────────
function TopBar({activeAM, setActiveAM, amStats, sbReady, onSync, syncing, syncMeta, onUpload, onExport, onSyncStaff, syncingStaff, onSyncNotes, syncingNotes, onDashboard, showDashboard}) {
  return (
    <div style={{background:'#0f172a',borderBottom:'1px solid #1e2d3d',padding:'0 24px',display:'flex',alignItems:'center',gap:0,position:'sticky',top:0,zIndex:100}}>
      {/* Brand */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginRight:32,padding:'12px 0'}}>
        <div style={{width:28,height:28,background:'#0066CC',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{color:'#fff',fontWeight:800,fontSize:12}}>M</span>
        </div>
        <div>
          <div style={{color:'#fff',fontWeight:700,fontSize:14,lineHeight:1}}>MEDirect</div>
          <div style={{color:'#64748b',fontSize:10,lineHeight:1,marginTop:1}}>Expert Account Management</div>
        </div>
      </div>

      {/* AM selector */}
      <div style={{display:'flex',gap:2,flex:1}}>
        {['All',...ALL_AMS].map(am=>{
          const col = am === 'All' ? '#64748b' : AM_COLORS[am]?.main;
          const isActive = activeAM === am;
          const stats = am !== 'All' ? amStats[am] : null;
          return (
            <button key={am} onClick={()=>setActiveAM(am)}
              style={{padding:'14px 18px',border:'none',borderBottom:`3px solid ${isActive?col:'transparent'}`,background:'none',color:isActive?'#fff':'#94a3b8',fontWeight:isActive?700:400,cursor:'pointer',fontSize:13,whiteSpace:'nowrap',transition:'all .15s',display:'flex',alignItems:'center',gap:8}}>
              {am === 'All' ? 'All AMs' : (
                <>
                  <Avatar name={am} size={22} color={col}/>
                  {am}
                  {stats && stats.needsContact > 0 && (
                    <span style={{background:'#ef4444',color:'#fff',borderRadius:10,padding:'1px 6px',fontSize:10,fontWeight:700}}>{stats.needsContact}</span>
                  )}
                </>
              )}
            </button>
          );
        })}
      </div>

      {/* Sync + status */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 8px'}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:sbReady?'#22c55e':'#f59e0b'}}/>
          <span style={{fontSize:11,color:'#64748b'}}>{sbReady?'Supabase live':'Local'}</span>
        </div>
        {syncMeta && (
          <span style={{fontSize:10,color:'#475569',borderLeft:'1px solid #334155',paddingLeft:8}}>
            Last sync: {new Date(syncMeta.ts).toLocaleDateString('en-AU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} · {syncMeta.count} experts
          </span>
        )}
        {sbReady && (
          <button onClick={onSync} disabled={syncing}
            style={{padding:'5px 12px',background:syncing?'#1e3a5f':'#0066CC',color:'#fff',border:'none',borderRadius:6,fontSize:11,fontWeight:600,cursor:syncing?'default':'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:5,opacity:syncing?0.7:1}}>
            {syncing?'⟳ Syncing…':'⟳ Sync Zoho'}
          </button>
        )}


        <button onClick={onUpload}
          style={{padding:'5px 12px',background:'#0f5132',color:'#fff',border:'none',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:5}}>
          ▲ Upload Reports
        </button>
        <button onClick={onDashboard}
          style={{padding:'5px 12px',background:showDashboard?'#4f46e5':'#1e3a5f',color:'#c7d2fe',border:`1px solid ${showDashboard?'#4f46e5':'#2563eb33'}`,borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:5}}>
          📊 Team View
        </button>
        <button onClick={onExport}
          style={{padding:'5px 12px',background:'#1e3a5f',color:'#93c5fd',border:'1px solid #2563eb33',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:5}}>
          ⬇ Export CSV
        </button>
      </div>
    </div>
  );
}

// ── List controls ─────────────────────────────────────────────────────────────

              <strong style={{color:'#0f172a'}}>🔵 Regular</strong> — contacted ≤14d, 2+ interactions this month<br/>
              <strong style={{color:'#0f172a'}}>🟡 Low</strong> — contacted ≤30d<br/>
              <strong style={{color:'#0f172a'}}>🔴 Cold</strong> — no contact in 30+ days<br/>
              <strong style={{color:'#0f172a'}}>⚪ None</strong> — never contacted
            </div>
            <div style={{fontSize:11,fontWeight:700,color:'#0f172a',marginBottom:4}}>Attention score ⚡</div>
            <div style={{fontSize:10,color:'#6b7280',lineHeight:1.6}}>
              Points added for: overdue contact (tier-weighted), active onboarding, issue flags, pending tasks, no invoice, revenue decline. Higher = needs action sooner.
            </div>
            <div style={{display:'flex',gap:6,marginTop:6}}>
              <span style={{fontSize:10,padding:'2px 8px',background:'#fef2f2',color:'#dc2626',borderRadius:10,border:'1px solid #fecaca',fontWeight:600}}>⚡ 50+ High</span>
              <span style={{fontSize:10,padding:'2px 8px',background:'#fffbeb',color:'#d97706',borderRadius:10,border:'1px solid #fde68a',fontWeight:600}}>⚡ 25–49 Med</span>
              <span style={{fontSize:10,padding:'2px 8px',background:'#f8faff',color:'#2563eb',borderRadius:10,border:'1px solid #e0e9ff',fontWeight:600}}>⚡ &lt;25 Low</span>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:'#0f172a',marginBottom:4,marginTop:8}}>Health score /100</div>
            <div style={{fontSize:10,color:'#6b7280',lineHeight:1.6}}>
              Starts at 50. Goes up with recent contact, interaction volume, revenue growth. Goes down with overdue contact, issue flags, pending tasks, revenue decline.
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:180,position:'relative'}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'#9ca3af'}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search experts or specialty…"
            style={{width:'100%',padding:'8px 10px 8px 32px',border:'1px solid #e5e7eb',borderRadius:7,fontSize:13,outline:'none',fontFamily:'inherit',background:'#f9fafb'}}/>
        </div>
        <select value={filterSt} onChange={e=>setFilterSt(e.target.value)}

  const {attention, health, band, reasons} = scoreExpert(expert, {[expert.name]: comms}, baselineData);

  const isMed  = attention >= 25 && attention < 50;

  const amCol = AM_COLORS[expert.am]?.main || '#6b7280';

  const availGap = getAvailabilityGap(expert.name);

    <div onClick={onClick} style={{
      background:'#fff',
      border:`1px solid ${isSelected?amCol:bandMeta.border}`,
      borderLeft: `4px solid ${isHigh?'#ef4444':isMed?'#f59e0b':bandMeta.color}`,

      padding:'11px 13px',

            {expert.name}

        </div>

        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>

            <span style={{padding:'1px 7px',background:stMeta.bg,color:stMeta.color,borderRadius:10,fontSize:10,fontWeight:600}}>
              {stMeta.label}
            </span>
            {(()=>{ const t=getTier(expert.name); const tm=t&&TIER_META[t]; return tm?(
              <span style={{padding:'1px 7px',background:tm.bg,color:tm.color,border:`1px solid ${tm.border}`,borderRadius:10,fontSize:10,fontWeight:700}}>{tm.label}</span>

            <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',background:bandMeta.bg,color:bandMeta.color,border:`1px solid ${bandMeta.border}`,borderRadius:10}}>
              {bandMeta.icon} {bandMeta.label}
            </span>
            {attention > 0 && (
              <span style={{fontSize:10,fontWeight:600,padding:'1px 7px',background:isHigh?'#fef2f2':isMed?'#fffbeb':'#f8faff',color:isHigh?'#dc2626':isMed?'#d97706':'#6b7280',borderRadius:10}}>
                ⚡ {attention} attn
              </span>

          </div>
        </div>

      {/* Training progress if in progress */}
      {expert.status !== 'Recruited' && (
        <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8}}>

      {/* Performance pills */}
      {(()=>{

        const stats = EXP_STATS[expert.name];

            {/* Attention tags */}
            {(()=>{
              const expertTags = (comms.tags||[]);

            {/* Pending tasks */}
            {(()=>{
              const pendingTasks=(comms.logs||[]).filter(l=>l.type==='task'&&!l.taskDone).length;
              return pendingTasks>0?<span style={{fontSize:10,padding:'2px 7px',borderRadius:8,background:'#ecfeff',color:'#0891b2',fontWeight:600}}>✅ {pendingTasks} task{pendingTasks>1?'s':''}</span>:null;

        <div style={{marginTop:5,padding:'3px 8px',background:reviewOverdue?'#fef2f2':'#fffbeb',borderRadius:5,border:`1px solid ${reviewOverdue?'#fecaca':'#fde68a'}`,display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:11}}>🔄</span>
          <span style={{fontSize:10,fontWeight:600,color:reviewOverdue?'#dc2626':'#d97706'}}>

        </div>
      )}

      {/* Exit risk indicator — only show high risk */}
      {exitRisk.level === 'high' && (
        <div style={{marginTop:5,padding:'3px 8px',background:'#fff7ed',borderRadius:5,border:'1px solid #fed7aa',display:'flex',alignItems:'center',gap:5}}>

      {/* Anniversary */}
      {anniversary && (
        <div style={{marginTop:5,padding:'3px 8px',background:'#fdf4ff',borderRadius:5,border:'1px solid #e9d5ff',display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:11}}>🎉</span>
          <span style={{fontSize:10,fontWeight:600,color:'#7c3aed'}}>
            {anniversary.daysTo <= 0 ? `${anniversary.years} year${anniversary.years>1?'s':''} with MEDirect!` : `${anniversary.years}-year anniversary in ${anniversary.daysTo}d`}
          </span>
        </div>
      )}

      {/* Availability gap */}
      {availGap && availGap.alert && (
        <div style={{marginTop:5,padding:'3px 8px',background:'#fffbeb',borderRadius:5,border:'1px solid #fde68a',display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:11}}>📅</span>
          <span style={{fontSize:10,fontWeight:600,color:'#d97706'}}>{availGap.gap}% slots unfilled — push availability</span>
        </div>
      )}

      {/* Follow-up indicator on card */}
      {(()=>{
        const allLogs = comms.logs || [];
        const fueLogs = allLogs.filter(l=>l.followUp && !l.followUpDone);
        if (fueLogs.length === 0) return null;
        const earliest = fueLogs.map(l=>({...l,d:daysUntilAEST(l.followUp)})).sort((a,b)=>a.d-b.d)[0];
        const overdue = earliest.d < 0;
        const today = earliest.d === 0;
        const soon = earliest.d > 0 && earliest.d <= 3;
        return (
          <div style={{marginTop:5,padding:'3px 8px',background:overdue?'#fef2f2':today||soon?'#fffbeb':'#f5f3ff',borderRadius:5,border:`1px solid ${overdue?'#fecaca':today||soon?'#fde68a':'#c4b5fd'}`,display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:11}}>📅</span>
            <span style={{fontSize:10,fontWeight:600,color:overdue?'#dc2626':today||soon?'#d97706':'#7c3aed'}}>
              {overdue ? `Follow-up ${Math.abs(earliest.d)}d overdue` : today ? 'Follow-up today' : earliest.d===1 ? 'Follow-up tomorrow' : `Follow-up in ${earliest.d}d`}
            </span>
          </div>
        );
      })()}

      {/* Last activity */}
      {lastLog ? (
        <div style={{marginTop:5,padding:'5px 8px',background:'#fafafa',borderRadius:5,border:'1px solid #f1f5f9',display:'flex',gap:6,alignItems:'flex-start'}}>

          </div>
        </div>
      ) : (
        <div style={{marginTop:5,padding:'4px 8px',background:'#fef2f2',borderRadius:5,border:'1px solid #fecaca'}}>
          <span style={{fontSize:11,color:'#ef4444',fontWeight:500}}>No interactions logged</span>
        </div>
      )}
    </div>

// ── AEST date helpers (global) ───────────────────────────────────────────────
function nowAEST() {
  return new Date(new Date().toLocaleString('en-US', {timeZone: 'Australia/Sydney'}));
}
function todayAEST() {
  const d = nowAEST();
  return d.toISOString().split('T')[0];
}
function daysUntilAEST(dateStr) {
  if (!dateStr) return null;
  const now = nowAEST();
  now.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.ceil((target - now) / 86400000);
}

              <span style={{padding:'1px 8px',background:exitRisk.level==='high'?'#dc2626':'#d97706',color:'#fff',borderRadius:10,fontSize:11,fontWeight:700,marginLeft:'auto'}}>{exitRisk.score}/100 {exitRisk.level==='high'?'High':'Medium'}</span>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {exitRisk.reasons.map((r,i) => (
                <span key={i} style={{fontSize:10,padding:'2px 7px',background:'#fff',borderRadius:8,border:'1px solid #fed7aa',color:'#92400e'}}>{r}</span>
              ))}
            </div>
          </div>
        </>
      )}

      {/* ── Onboarding velocity ── */}
      {onboardVelocity && onboardVelocity.status !== 'on_track' && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:'#0f172a',marginBottom:8,marginTop:16,textTransform:'uppercase',letterSpacing:'.5px'}}>Onboarding Velocity</div>
          <InsightCard
            icon={onboardVelocity.status==='achieved'?'✅':onboardVelocity.status==='overdue'?'🔴':'🟡'}
            title="First booking target (45 days)"
            value={onboardVelocity.status==='achieved'?'✓ First booking achieved':onboardVelocity.status==='overdue'?`${onboardVelocity.days - onboardVelocity.target}d overdue`:'At risk'}
            sub={`${onboardVelocity.days} days since recruited${onboardVelocity.status!=='achieved'?` · Target: first booking within ${onboardVelocity.target} days`:''}`}
            color={onboardVelocity.status==='achieved'?'#15803d':onboardVelocity.status==='overdue'?'#dc2626':'#d97706'}
            bg={onboardVelocity.status==='achieved'?'#f0fdf4':onboardVelocity.status==='overdue'?'#fef2f2':'#fffbeb'}
            border={onboardVelocity.status==='achieved'?'#86efac':onboardVelocity.status==='overdue'?'#fecaca':'#fde68a'}
          />
        </>
      )}

      {/* ── Sentiment ── */}
      {sentiment && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:'#0f172a',marginBottom:8,marginTop:16,textTransform:'uppercase',letterSpacing:'.5px'}}>Interaction Sentiment (last 10)</div>
          <div style={{padding:'12px 14px',background:'#f8faff',borderRadius:9,border:'1px solid #e0e9ff',marginBottom:10}}>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:18,fontWeight:700,color:'#15803d'}}>{sentiment.positive}</div>
                <div style={{fontSize:10,color:'#6b7280'}}>😊 Positive</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:18,fontWeight:700,color:'#6b7280'}}>{sentiment.neutral}</div>
                <div style={{fontSize:10,color:'#6b7280'}}>😐 Neutral</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:18,fontWeight:700,color:'#dc2626'}}>{sentiment.negative}</div>
                <div style={{fontSize:10,color:'#6b7280'}}>😟 Negative</div>
              </div>
              <div style={{flex:1,height:6,background:'#f1f5f9',borderRadius:3,overflow:'hidden',display:'flex'}}>
                <div style={{width:`${(sentiment.positive/(sentiment.positive+sentiment.neutral+sentiment.negative))*100}%`,background:'#16a34a',transition:'width .3s'}}/>
                <div style={{width:`${(sentiment.neutral/(sentiment.positive+sentiment.neutral+sentiment.negative))*100}%`,background:'#d1d5db'}}/>
                <div style={{width:`${(sentiment.negative/(sentiment.positive+sentiment.neutral+sentiment.negative))*100}%`,background:'#dc2626'}}/>
              </div>
            </div>
          </div>
        </>
      )}

      {/* ── Anniversary ── */}
      {anniversary && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:'#0f172a',marginBottom:8,marginTop:16,textTransform:'uppercase',letterSpacing:'.5px'}}>Milestone</div>
          <InsightCard
            icon="🎉"
            title={anniversary.daysTo <= 0 ? 'Work anniversary today!' : 'Upcoming anniversary'}
            value={`${anniversary.years} year${anniversary.years>1?'s':''} with MEDirect`}
            sub={anniversary.daysTo <= 0 ? 'Great opportunity to send a personal note' : `Anniversary in ${anniversary.daysTo} days — set a reminder to reach out`}
            color="#7c3aed"
            bg="#fdf4ff"
            border="#e9d5ff"
            action="Send note"
            onAction={()=>showToast('Switch to Comms tab to log a message')}
          />
        </>
      )}

      {/* ── Scheme gap ── */}
      {schemeGap && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:'#0f172a',marginBottom:8,marginTop:16,textTransform:'uppercase',letterSpacing:'.5px'}}>Scheme Utilisation</div>
          <InsightCard
            icon="📋"
            title="Low volume in primary scheme"
            value={`${schemeGap.cases} cases — ${schemeGap.scheme}`}
            sub="Expert has low case volume in their primary scheme. Consider discussing referrer pipeline, scheme awareness, or availability."
            color="#d97706"
            bg="#fffbeb"
            border="#fde68a"
          />
        </>
      )}

      {/* All clear */}
      {exitRisk.level === 'low' && !rev?.alert && !availGap?.alert && reviewDaysUntil > 7 && !anniversary && !schemeGap && (
        <div style={{padding:'20px',textAlign:'center',color:'#9ca3af',fontSize:12}}>
          ✓ No alerts — this expert is well managed
        </div>
      )}
    </div>
  );
}

// ── Feedback tab component (must be a real component so hooks work) ──────────
function FeedbackTab({comms, onSave, tags, currentTier, amCol, showToast}) {
  const [feedbackText, setFeedbackText] = useState(comms.feedback || '');
  const [feedbackDirty, setFeedbackDirty] = useState(false);

  // Sync feedbackText if comms changes (switching experts)
  React.useEffect(() => {
    setFeedbackText(comms.feedback || '');
    setFeedbackDirty(false);
  }, [comms.feedback]);

  const FEEDBACK_ITEMS = [
    {key:'report_quality',       label:'Report Quality',        icon:'📄'},
    {key:'report_tat',           label:'Report Turnaround Time',icon:'⏱'},
    {key:'report_completeness',  label:'Report Completeness',   icon:'✅'},
    {key:'report_formatting',    label:'Report Formatting',     icon:'📋'},
    {key:'referrer_feedback',    label:'Referrer Feedback',     icon:'💬'},
    {key:'expert_responsiveness',label:'Expert Responsiveness', icon:'📞'},
  ];

  const ratings = comms.feedbackRatings || {};

  const toggleRating = async (key, val) => {
    const updated = {...(comms.feedbackRatings||{}), [key]: ratings[key]===val ? null : val};
    await onSave({...comms, feedbackRatings: updated, feedback: feedbackText, tags, prevTier: currentTier});
    showToast('✓ Saved');
  };

  return (
    <div>
      <div style={{fontSize:11,color:'#6b7280',marginBottom:12}}>Rate expert performance across key dimensions. Negative ratings auto-flag for attention.</div>
      {FEEDBACK_ITEMS.map(item => (
        <div key={item.key} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f9fafb'}}>
          <span style={{fontSize:16}}>{item.icon}</span>
          <span style={{fontSize:12,color:'#374151',flex:1,fontWeight:500}}>{item.label}</span>
          <div style={{display:'flex',gap:4}}>
            {['good','ok','poor'].map(r => (
              <button key={r} onClick={()=>toggleRating(item.key, r)}
                style={{padding:'3px 10px',
                  border:`1px solid ${ratings[item.key]===r?(r==='good'?'#16a34a':r==='ok'?'#d97706':'#dc2626'):'#e5e7eb'}`,
                  borderRadius:12,
                  background:ratings[item.key]===r?(r==='good'?'#f0fdf4':r==='ok'?'#fffbeb':'#fef2f2'):'transparent',
                  color:ratings[item.key]===r?(r==='good'?'#15803d':r==='ok'?'#92400e':'#dc2626'):'#9ca3af',
                  fontSize:11,fontWeight:ratings[item.key]===r?700:400,cursor:'pointer',fontFamily:'inherit'}}>
                {r==='good'?'✓ Good':r==='ok'?'~ OK':'✗ Poor'}
              </button>
            ))}
          </div>
        </div>
      ))}
      <div style={{marginTop:14}}>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:6}}>Additional feedback notes</div>
        <textarea value={feedbackText} onChange={e=>{setFeedbackText(e.target.value);setFeedbackDirty(true);}}
          placeholder="Notes on report quality, referrer complaints, observations..."
          style={{width:'100%',minHeight:100,padding:'9px 11px',border:'1px solid #e5e7eb',borderRadius:7,fontSize:12,fontFamily:'inherit',resize:'vertical'}}/>
        {feedbackDirty && (
          <button onClick={async()=>{
            await onSave({...comms, feedback: feedbackText, feedbackRatings: ratings, tags, prevTier: currentTier});
            setFeedbackDirty(false);
            showToast('✓ Saved');
          }} style={{marginTop:6,padding:'7px 16px',background:amCol,color:'#fff',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
            Save feedback
          </button>
        )}
      </div>
    </div>
  );
}

// ── Expert panel ──────────────────────────────────────────────────────────────
function ExpertPanel({expert, comms, onSave, onClose, showToast, onFlagNew, zohoContacts, onZohoFetch, baselineData, crmNotes}) {
  baselineData = baselineData || {};
  const [tab, setTab] = useState('comms');
  const [logs, setLogs] = useState(comms.logs || []);
  const [notes, setNotes] = useState(comms.notes || '');
  const [training, setTraining] = useState(comms.training || {});
  const [onboarding, setOnboarding] = useState(comms.onboarding || {});
  const [recruitedDate, setRecruitedDate] = useState(comms.recruited_date || null);
  const [tags, setTags] = useState(comms.tags || []);
  const [showEmail, setShowEmail] = useState(false);
  const [emailDraft, setEmailDraft] = useState({to:'', toName:'', subject:'', body:''});
  const [supportStaff, setSupportStaff] = useState(null);
  const [staffLoading, setStaffLoading] = useState(false);
  const [zohoNotes, setZohoNotes] = useState(null);
  const [zohoNotesLoading, setZohoNotesLoading] = useState(false);
  const blankLog = () => ({type:'call', note:'', by: expert.am || '', date: todayAEST(), followUp:'', task:'', sentiment:'neutral'});
  const [newLog, setNewLog] = useState(blankLog());
  const [showLogForm, setShowLogForm] = useState(false);
  const [notesDirty, setNotesDirty] = useState(false);
  const [prevTier] = useState(comms.prevTier || null);
  const amCol = AM_COLORS[expert.am]?.main || '#0066CC';
  const stMeta = STATUS_META[expert.status] || STATUS_META['Recruited'];
  const {attention, health, band, reasons} = scoreExpert(expert, {[expert.name]: comms}, baselineData);
  const score = attention;
  const currentTier = getTier(expert.name);
  const tierChanged = prevTier && prevTier !== currentTier;

  const save = useCallback(async (l, n, tr, ob, rd, tgs) => {
    const rec = {logs: l||logs, notes: n!==undefined?n:notes, training: tr||training, onboarding: ob||onboarding, recruited_date: rd!==undefined?rd:recruitedDate, tags: tgs||tags, prevTier: currentTier};
    await onSave(rec);
  }, [logs, notes, training, onboarding, recruitedDate, tags, currentTier, onSave]);

  const saveNotes = useCallback(async () => {
    await save(logs, notes);
    setNotesDirty(false);
    showToast('Notes saved');
  }, [logs, notes, save, showToast]);

  const deleteLog = useCallback(async (idOrIdx) => {
    const updated = logs.filter((l,i) => (l.id ? l.id !== idOrIdx : i !== idOrIdx));
    setLogs(updated);
    await save(updated);
  }, [logs, save]);

  const setAndSaveRecruitedDate = useCallback(async (date) => {
    await save(logs, notes, training, onboarding, date);
  }, [logs, notes, training, onboarding, save]);

  const toggleTraining = useCallback(async (item) => {
    const updated = {...training, [item]: !training[item]};
    setTraining(updated);
    await save(logs, notes, updated);
  }, [logs, notes, training, save]);

  const toggleOnboarding = useCallback(async (id) => {
    const updated = {...onboarding, [id]: !onboarding[id]};
    setOnboarding(updated);
    await save(logs, notes, training, updated);
  }, [logs, notes, training, onboarding, save]);

  const trainingPct = Math.round(Object.values(training).filter(Boolean).length / TRAINING_ITEMS.length * 100);

  const addLog = useCallback(async () => {
    if (!newLog.note.trim() && !newLog.task.trim()) return;
    const entry = {...newLog, id: Date.now(), ts: Date.now()};
    const updated = [entry, ...logs];
    setLogs(updated);
    setNewLog(blankLog());
    setShowLogForm(false);
    await save(updated);
  }, [newLog, logs, blankLog, save]);

  const toggleTag = useCallback(async (tagVal) => {
    const updated = tags.includes(tagVal) ? tags.filter(t => t !== tagVal) : [...tags, tagVal];
    setTags(updated);
    await save(logs, notes, training, onboarding, recruitedDate, updated);
  }, [tags, logs, notes, training, onboarding, recruitedDate, save]);

  return (
    <div style={{flex:1,minWidth:0,background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:'18px 20px',overflowY:'auto',display:'flex',flexDirection:'column',gap:0}}>

      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:14}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:16,color:'#0f172a',lineHeight:1.2}}>{expert.name}</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:3}}>{expert.spec}</div>
            <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
              {expert.am && (
                <span style={{padding:'2px 8px',background:AM_COLORS[expert.am]?.light,color:AM_COLORS[expert.am]?.text,borderRadius:10,fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                  <Avatar name={expert.am} size={14} color={amCol}/>
                  {expert.am}
                </span>
              )}
              <span style={{padding:'2px 8px',background:stMeta.bg,color:stMeta.color,borderRadius:10,fontSize:11,fontWeight:600}}>
                {stMeta.label}
              </span>
              {(()=>{ const t=getTier(expert.name); const tm=t&&TIER_META[t]; return tm?(
                <span style={{padding:'2px 8px',background:tm.bg,color:tm.color,border:`1px solid ${tm.border}`,borderRadius:10,fontSize:11,fontWeight:700}}>{tm.label}</span>
              ):null; })()}
              {score >= 30 && (
                <span style={{padding:'2px 8px',background:'#fef2f2',color:'#ef4444',borderRadius:10,fontSize:11,fontWeight:600}}>
                  🔴 Needs attention
                </span>
              )}
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            {!recruitedDate && (
              <button onClick={()=>{
                const today = new Date().toISOString();
                setRecruitedDate(today);
                setAndSaveRecruitedDate(today);
                onFlagNew && onFlagNew();
                setTab('onboarding');
              }}
                style={{padding:'4px 10px',border:'1px solid #0066CC',borderRadius:6,background:'#EBF3FF',cursor:'pointer',color:'#0066CC',fontSize:11,fontWeight:600}}>
                🆕 Flag new recruit

            {recruitedDate && (
              <span style={{padding:'4px 10px',background:'#EBF3FF',color:'#0066CC',borderRadius:6,fontSize:10,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                🆕 Recruited {new Date(recruitedDate).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'})}
                <button onClick={async(e)=>{e.stopPropagation();setRecruitedDate(null);setOnboarding({});await save(logs,notes,training,{},null);}} title="Remove new recruit flag"
                  style={{marginLeft:4,background:'none',border:'none',cursor:'pointer',color:'#93c5fd',fontSize:12,lineHeight:1,padding:'0 1px'}}>×</button>
              </span>
            )}
            <button onClick={()=>{setShowEmail(true); setSupportStaff(null); setEmailDraft({to:'',toName:'',subject:'',body:''}); }} title="Email expert support"
              style={{padding:'4px 10px',border:'1px solid #2563eb33',borderRadius:6,background:'#eff6ff',cursor:'pointer',color:'#2563eb',fontSize:11,fontWeight:600}}>✉ Email</button>
            <button onClick={onClose} style={{padding:'4px 8px',border:'1px solid #e5e7eb',borderRadius:6,background:'transparent',cursor:'pointer',color:'#6b7280',fontSize:13}}>✕</button>
          </div>
        </div>

        {/* Quick stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginTop:12}}>
          <div style={{background:BAND_META[band].bg,borderRadius:7,padding:'8px 10px',border:`1px solid ${BAND_META[band].border}`}}>
            <div style={{fontSize:9,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.4px'}}>Engagement</div>
            <div style={{fontSize:12,fontWeight:700,color:BAND_META[band].color,marginTop:2}}>{BAND_META[band].icon} {BAND_META[band].label}</div>
          </div>
          <div style={{background:health>=70?'#f0fdf4':health>=40?'#fffbeb':'#fef2f2',borderRadius:7,padding:'8px 10px',border:`1px solid ${health>=70?'#86efac':health>=40?'#fde68a':'#fecaca'}`}}>
            <div style={{fontSize:9,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.4px'}}>Health</div>
            <div style={{fontSize:12,fontWeight:700,color:health>=70?'#15803d':health>=40?'#92400e':'#dc2626',marginTop:2}}>{health}/100</div>
          </div>
          <div style={{background:attention>=50?'#fef2f2':attention>=25?'#fffbeb':'#f8faff',borderRadius:7,padding:'8px 10px',border:`1px solid ${attention>=50?'#fecaca':attention>=25?'#fde68a':'#e0e9ff'}`}}>
            <div style={{fontSize:9,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.4px'}}>Attention</div>
            <div style={{fontSize:12,fontWeight:700,color:attention>=50?'#dc2626':attention>=25?'#d97706':'#2563eb',marginTop:2}}>{attention > 0 ? `⚡ ${attention}` : '✓ Low'}</div>
